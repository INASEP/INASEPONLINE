<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INASEP — Plataforma de Clases en Vivo</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<!-- SheetJS para leer/escribir Excel -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
/* ══════════════════════════════════════════════
   VARIABLES — PALETA INASEP
══════════════════════════════════════════════ */
:root {
  --green-900: #0d1f14;
  --green-800: #142a1b;
  --green-700: #1e3d28;
  --green-600: #2a5536;
  --green-500: #3d7a4e;
  --green-400: #4a8c5c;
  --green-300: #68a87a;
  --green-200: #9fcfab;
  --green-100: #d4edda;
  --green-50:  #f0f8f2;
  --primary:      #4a8c5c;
  --primary-dark: #3d7a4e;
  --primary-light:#68a87a;
  --accent:       #8fbc8f;
  --sidebar-bg:   #0d1f14;
  --sidebar-nav:  #142a1b;
  --sidebar-hover:#1e3d28;
  --sidebar-border: rgba(255,255,255,0.07);
  --bg:       #f4f7f5;
  --card-bg:  #ffffff;
  --text:     #1a2e1e;
  --text-mid: #4a6651;
  --text-light:#7a9880;
  --border:   #d6e8da;
  --success: #27ae60;
  --warning: #e67e22;
  --danger:  #c0392b;
  --info:    #2980b9;
  --radius:  10px;
  --radius-lg: 16px;
  --shadow:  0 2px 14px rgba(13,31,20,0.08);
  --shadow-md: 0 6px 24px rgba(13,31,20,0.13);
  --transition: 0.18s ease;
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Sora', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.6;
}

/* ══════════════════════════════════════════════
   LAYOUT
══════════════════════════════════════════════ */
.dashboard { display: flex; min-height: 100vh; }
.sidebar {
  width: 260px;
  background: var(--sidebar-bg);
  display: flex; flex-direction: column;
  position: fixed; top:0; left:0; bottom:0;
  z-index: 200; overflow-y: auto;
  transition: transform 0.28s ease;
}
.sidebar-top {
  padding: 22px 20px 16px;
  border-bottom: 1px solid var(--sidebar-border);
  display: flex; align-items: center; gap: 12px;
}
.sidebar-top .brand { color:#fff; font-size:15px; font-weight:700; }
.sidebar-top .sub   { color: rgba(255,255,255,0.45); font-size:11px; margin-top:2px; }
.sidebar-nav { flex:1; padding: 10px 0; }
.sidebar-nav a {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 20px;
  color: rgba(255,255,255,0.65);
  text-decoration: none; font-size: 13.5px; font-weight: 500;
  transition: var(--transition); cursor: pointer;
  border-left: 3px solid transparent;
}
.sidebar-nav a:hover { background: var(--sidebar-hover); color:#fff; }
.sidebar-nav a.active {
  background: var(--sidebar-hover); color: var(--green-200);
  border-left-color: var(--green-300); font-weight: 600;
}
.sidebar-user {
  padding: 14px 20px;
  border-top: 1px solid var(--sidebar-border);
}
.sidebar-user .sb-name  { color:#fff; font-size:13px; font-weight:600; }
.sidebar-user .sb-email { color:rgba(255,255,255,0.4); font-size:11px; margin-top:2px; }
.sidebar-footer {
  padding: 12px 20px 16px;
}
.sidebar-footer button {
  background: none; border: 1px solid rgba(255,255,255,0.15);
  color: rgba(255,255,255,0.55); padding: 8px 14px;
  border-radius: 7px; font-size: 12.5px; cursor: pointer;
  width: 100%; font-family: inherit; transition: var(--transition);
}
.sidebar-footer button:hover { background: rgba(255,255,255,0.07); color:#fff; }
.main-wrapper { margin-left: 260px; flex:1; display:flex; flex-direction:column; }
.topbar {
  height: 60px; background:#fff; border-bottom:1px solid var(--border);
  display: flex; align-items: center; padding: 0 28px; gap: 16px;
  position: sticky; top:0; z-index:100; box-shadow: var(--shadow);
}
.topbar-title { font-size:16px; font-weight:700; color:var(--green-900); margin-right:auto; }
.topbar-user { display:flex; align-items:center; gap:8px; font-size:13px; font-weight:600; color:var(--text-mid); }
.avatar { width:32px; height:32px; border-radius:50%; background:var(--green-500); color:#fff; font-weight:700; font-size:13px; display:flex; align-items:center; justify-content:center; }
.mob-menu-btn { display:none; background:var(--sidebar-bg); border:none; color:#fff; width:38px; height:38px; border-radius:8px; font-size:18px; cursor:pointer; align-items:center; justify-content:center; }
.mob-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:150; }
.mob-overlay.active { display:block; }
.main-content { padding: 28px 32px; flex:1; }

/* ══════════════════════════════════════════════
   PAGE HEADER
══════════════════════════════════════════════ */
.page-header {
  margin-bottom: 24px; display:flex; align-items:flex-start;
  justify-content:space-between; flex-wrap:wrap; gap:12px;
}
.page-header h2 { font-size:22px; font-weight:700; color:var(--green-900); }
.breadcrumb { font-size:12.5px; color:var(--text-light); margin-top:3px; }
.breadcrumb a { color:var(--primary); text-decoration:none; cursor:pointer; }

/* ══════════════════════════════════════════════
   CARDS
══════════════════════════════════════════════ */
.card {
  background:var(--card-bg); border-radius:var(--radius);
  box-shadow:var(--shadow); padding:22px 24px;
  margin-bottom:18px; border:1px solid var(--border);
}
.card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; flex-wrap:wrap; gap:10px; }
.card-header h3 { font-size:16px; font-weight:700; color:var(--green-900); }
.stats-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:16px; margin-bottom:24px; }
.stat-card { background:#fff; border:1px solid var(--border); border-radius:var(--radius); padding:18px 20px; box-shadow:var(--shadow); }
.stat-card .stat-icon { font-size:26px; margin-bottom:8px; }
.stat-card .stat-value { font-size:26px; font-weight:700; color:var(--primary); line-height:1; }
.stat-card .stat-label { font-size:12px; color:var(--text-light); margin-top:4px; font-weight:500; text-transform:uppercase; letter-spacing:0.4px; }

/* ══════════════════════════════════════════════
   BUTTONS
══════════════════════════════════════════════ */
.btn {
  display:inline-flex; align-items:center; gap:6px;
  padding:10px 20px; border:none; border-radius:8px;
  font-size:13.5px; font-weight:600; font-family:inherit;
  cursor:pointer; transition:var(--transition);
  text-decoration:none; letter-spacing:0.2px; white-space:nowrap;
}
.btn-primary   { background:var(--primary); color:#fff; }
.btn-primary:hover { background:var(--primary-dark); box-shadow:0 4px 16px rgba(74,140,92,0.35); transform:translateY(-1px); }
.btn-secondary { background:#eef3f0; color:var(--text-mid); }
.btn-secondary:hover { background:#dde8e1; }
.btn-danger    { background:var(--danger); color:#fff; }
.btn-danger:hover { background:#a93226; }
.btn-success   { background:var(--success); color:#fff; }
.btn-success:hover { background:#219a52; }
.btn-warning   { background:var(--warning); color:#fff; }
.btn-warning:hover { background:#ca6f1e; }
.btn-info      { background:var(--info); color:#fff; }
.btn-info:hover { background:#1f6ea3; }
.btn-sm { padding:6px 13px; font-size:12px; border-radius:6px; }
.btn:disabled { opacity:0.55; cursor:not-allowed; transform:none !important; }
.btn-live { background: linear-gradient(135deg, #c0392b, #e74c3c); color:#fff; animation: livePulse 2s ease-in-out infinite; }
@keyframes livePulse { 0%,100%{box-shadow:0 0 0 0 rgba(192,57,43,0.4)} 50%{box-shadow:0 0 0 8px rgba(192,57,43,0)} }

/* ══════════════════════════════════════════════
   TABLE
══════════════════════════════════════════════ */
.table-wrap { overflow-x:auto; }
table { width:100%; border-collapse:collapse; font-size:13.5px; }
th, td { padding:11px 14px; text-align:left; border-bottom:1px solid #eef2ef; }
th { background:var(--green-50); font-weight:700; font-size:11px; text-transform:uppercase; letter-spacing:0.5px; color:var(--text-mid); }
tr:last-child td { border-bottom:none; }
tr:hover td { background:#f9fcfa; }

/* ══════════════════════════════════════════════
   BADGE
══════════════════════════════════════════════ */
.badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600; }
.badge-green  { background:#e6f9ee; color:#1a7a3a; }
.badge-gray   { background:#f0f0f0; color:#666; }
.badge-blue   { background:#e6f0ff; color:#1a56db; }
.badge-orange { background:#fef3e6; color:#b45309; }
.badge-red    { background:#fde8e8; color:#a93226; }
.badge-live   { background:#fde8e8; color:#c0392b; animation: blinkBadge 1.5s ease infinite; }
@keyframes blinkBadge { 0%,100%{opacity:1} 50%{opacity:0.5} }

/* ══════════════════════════════════════════════
   MODAL
══════════════════════════════════════════════ */
.modal-overlay { position:fixed; inset:0; background:rgba(13,31,20,0.65); z-index:999; display:flex; align-items:center; justify-content:center; padding:20px; backdrop-filter:blur(4px); }
.modal { background:#fff; border-radius:var(--radius-lg); padding:28px 30px; width:100%; max-width:680px; max-height:90vh; overflow-y:auto; box-shadow:0 30px 80px rgba(0,0,0,0.3); }
.modal h3 { margin-bottom:18px; font-size:18px; font-weight:700; color:var(--green-900); }
.modal-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:18px; flex-wrap:wrap; }
.modal-wide { max-width:950px; }

/* ══════════════════════════════════════════════
   FORM
══════════════════════════════════════════════ */
.form-group { margin-bottom:15px; }
.form-group label { display:block; font-size:11.5px; font-weight:600; text-transform:uppercase; letter-spacing:0.6px; color:var(--text-mid); margin-bottom:6px; }
.form-group input, .form-group select, .form-group textarea {
  width:100%; padding:11px 13px; border:2px solid var(--border);
  border-radius:8px; font-size:14px; font-family:inherit;
  background:#fafcfb; color:var(--text); transition:var(--transition); resize:vertical;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  outline:none; border-color:var(--primary); background:#fff;
  box-shadow:0 0 0 3px rgba(74,140,92,0.12);
}
.form-group small { display:block; margin-top:5px; font-size:12px; color:var(--text-light); }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:14px; }

/* ══════════════════════════════════════════════
   CLASE EN VIVO — CARD
══════════════════════════════════════════════ */
.live-class-card { background:#fff; border-radius:var(--radius-lg); border:1px solid var(--border); overflow:hidden; box-shadow:var(--shadow); transition:var(--transition); margin-bottom:16px; }
.live-class-card:hover { box-shadow:var(--shadow-md); transform:translateY(-2px); }
.live-class-header { background:linear-gradient(135deg,var(--green-900) 0%,var(--green-700) 100%); padding:16px 20px; display:flex; align-items:center; justify-content:space-between; }
.live-class-header h4 { color:#fff; font-size:15px; font-weight:700; }
.live-class-body { padding:18px 20px; }
.live-class-meta { display:flex; gap:16px; flex-wrap:wrap; font-size:13px; color:var(--text-mid); margin-bottom:14px; }
.live-class-meta span { display:flex; align-items:center; gap:5px; }
.live-class-actions { display:flex; gap:8px; flex-wrap:wrap; }

/* ══════════════════════════════════════════════
   VIDEO PLAYER
══════════════════════════════════════════════ */
.video-room { background:#000; border-radius:var(--radius-lg); overflow:hidden; position:relative; min-height:500px; display:flex; align-items:center; justify-content:center; }
.video-placeholder { display:flex; flex-direction:column; align-items:center; justify-content:center; color:rgba(255,255,255,0.6); gap:12px; padding:40px; text-align:center; }
.video-placeholder .icon { font-size:60px; opacity:0.4; }
iframe.video-frame { width:100%; height:100%; min-height:500px; border:none; }

/* ══════════════════════════════════════════════
   ASISTENCIA — CHECKBOX GRANDE
══════════════════════════════════════════════ */
.attendance-check-box {
  border:2px solid var(--border); border-radius:var(--radius-lg);
  padding:24px; text-align:center; margin-bottom:20px;
  background: linear-gradient(135deg, #f0f8f2, #fff);
}
.attendance-check-box.checked {
  border-color: var(--success);
  background: linear-gradient(135deg, #eafaf1, #f5fdf7);
}
.check-label { font-size:16px; font-weight:700; color:var(--green-900); margin-bottom:16px; display:block; }
.check-wrapper { display:flex; align-items:center; justify-content:center; gap:16px; }
.big-check {
  width:56px; height:56px; border:3px solid var(--border);
  border-radius:12px; cursor:pointer; appearance:none; -webkit-appearance:none;
  background:#fff; transition:all 0.2s ease; position:relative; flex-shrink:0;
}
.big-check:checked {
  background: var(--success); border-color: var(--success);
}
.big-check:checked::after {
  content:'✓'; position:absolute; top:50%; left:50%;
  transform:translate(-50%,-55%); color:#fff; font-size:30px; font-weight:700;
}
.big-check:hover:not(:checked) { border-color:var(--primary); background:var(--green-50); }
.check-text { font-size:15px; color:var(--text-mid); font-weight:500; text-align:left; }
.check-text strong { display:block; color:var(--green-900); font-size:16px; }
.attendance-time-stamp { font-size:12px; color:var(--text-light); margin-top:8px; font-family:'DM Mono',monospace; }

/* Tabla de asistencia diaria */
.att-table-wrap { overflow-x:auto; }
.att-table { width:100%; border-collapse:collapse; font-size:13px; min-width:500px; }
.att-table th { background:var(--green-50); font-weight:700; font-size:10.5px; text-transform:uppercase; letter-spacing:0.4px; color:var(--text-mid); padding:9px 12px; white-space:nowrap; }
.att-table td { padding:9px 12px; border-bottom:1px solid #eef2ef; vertical-align:middle; }
.att-table tr:last-child td { border-bottom:none; }
.att-table tr:hover td { background:#f9fcfa; }
.att-dot-ok  { display:inline-block; width:18px; height:18px; border-radius:4px; background:var(--success); text-align:center; line-height:18px; font-size:11px; color:#fff; }
.att-dot-no  { display:inline-block; width:18px; height:18px; border-radius:4px; background:#e0e0e0; }
.att-pct { font-weight:700; font-size:13px; }
.att-pct.good    { color:var(--success); }
.att-pct.warning { color:var(--warning); }
.att-pct.danger  { color:var(--danger);  }

/* Online indicator */
.online-dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:var(--success); animation:blinkBadge 2s ease infinite; margin-right:4px; }
.offline-dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:#ccc; margin-right:4px; }

/* ══════════════════════════════════════════════
   HORARIO
══════════════════════════════════════════════ */
.schedule-grid { display:grid; gap:8px; }
.schedule-row { display:grid; grid-template-columns:80px 1fr; align-items:center; gap:12px; padding:10px 14px; background:#fff; border:1px solid var(--border); border-radius:8px; }
.schedule-time { font-family:'DM Mono',monospace; font-size:13px; font-weight:600; color:var(--primary); }
.schedule-subject { font-size:14px; font-weight:500; color:var(--text); }
.schedule-day { font-size:12px; color:var(--text-light); margin-top:2px; }

/* ══════════════════════════════════════════════
   TOAST
══════════════════════════════════════════════ */
.toast-container { position:fixed; top:16px; right:16px; z-index:9999; display:flex; flex-direction:column; gap:8px; max-width:360px; }
.toast { background:#fff; border-radius:10px; padding:13px 16px; box-shadow:0 4px 20px rgba(0,0,0,0.15); display:flex; align-items:center; gap:10px; font-size:13.5px; font-weight:500; border-left:4px solid var(--primary); animation:slideInRight 0.25s ease; }
.toast.success { border-color:var(--success); }
.toast.error   { border-color:var(--danger); }
.toast.warning { border-color:var(--warning); }
@keyframes slideInRight { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:none} }

/* ══════════════════════════════════════════════
   AUTH
══════════════════════════════════════════════ */
.auth-wrap {
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  padding:24px 16px; background:var(--green-900);
  background-image: radial-gradient(ellipse at 20% 50%, rgba(74,140,92,0.18) 0%, transparent 60%),
                    radial-gradient(ellipse at 80% 20%, rgba(143,188,143,0.10) 0%, transparent 50%);
}
.auth-card { background:#fff; border-radius:var(--radius-lg); padding:40px 36px 36px; width:100%; max-width:430px; box-shadow:0 24px 64px rgba(0,0,0,0.35); }
.auth-logo { text-align:center; margin-bottom:28px; }
.auth-logo .brand-name { font-size:32px; font-weight:800; color:var(--green-400); letter-spacing:2px; }
.auth-logo .brand-sub { font-size:12px; color:var(--text-light); text-transform:uppercase; letter-spacing:1px; margin-top:4px; }
.auth-card h2 { font-size:19px; font-weight:700; color:var(--green-900); margin-bottom:22px; text-align:center; }
.alert { padding:11px 15px; border-radius:8px; font-size:13px; font-weight:500; display:none; margin-bottom:16px; border-left:4px solid; }
.alert-error   { background:#fdecea; color:#9b2335; border-color:#e74c3c; }
.alert-success { background:#eafaf1; color:#1e7e34; border-color:#27ae60; }

/* ══════════════════════════════════════════════
   UTILIDADES
══════════════════════════════════════════════ */
.hidden { display:none !important; }
.flex { display:flex; }
.items-center { align-items:center; }
.justify-between { justify-content:space-between; }
.gap-2 { gap:8px; }
.gap-3 { gap:12px; }
.mt-1 { margin-top:6px; }
.mt-2 { margin-top:14px; }
.mb-2 { margin-bottom:14px; }
.text-right { text-align:right; }
.text-center { text-align:center; }
.empty-state { text-align:center; padding:50px 20px; color:var(--text-light); }
.empty-state .icon { font-size:48px; margin-bottom:12px; }

/* Upload zone */
.upload-zone {
  border:2px dashed var(--border); border-radius:12px;
  padding:32px; text-align:center; cursor:pointer;
  transition:var(--transition); background:#fafcfb;
}
.upload-zone:hover, .upload-zone.dragging { border-color:var(--primary); background:var(--green-50); }
.upload-zone .icon { font-size:40px; margin-bottom:10px; }
.upload-zone p { font-size:14px; color:var(--text-mid); }
.upload-zone small { font-size:12px; color:var(--text-light); }

/* Progress bar */
.progress-bar-wrap { background:#e8f5e9; border-radius:8px; padding:4px; margin-bottom:6px; }
.progress-bar { background:var(--primary); height:8px; border-radius:8px; width:0%; transition:width 0.3s; }

/* ══════════════════════════════════════════════
   RESPONSIVE
══════════════════════════════════════════════ */
@media (max-width: 768px) {
  .sidebar { transform: translateX(-100%); transition: transform 0.25s ease; }
  .sidebar.open { transform: none; box-shadow: 4px 0 24px rgba(0,0,0,0.25); }
  .main-wrapper { margin-left: 0; }
  .mob-menu-btn { display: flex; }
  .main-content { padding: 12px; }
  .page-header { flex-direction: column; align-items: flex-start; gap: 10px; }
  .page-header .btn { width: 100%; justify-content: center; }
  .form-row { grid-template-columns: 1fr; }
  .stats-grid { grid-template-columns: 1fr 1fr; }
  .live-class-actions { flex-direction: column; }
  .live-class-actions .btn { width: 100%; justify-content: center; }
  .video-room { min-height: 0; aspect-ratio: 16/9; height: auto; }
  iframe.video-frame { min-height: 0; height: 100%; aspect-ratio: 16/9; }
  .auth-card { padding: 24px 20px; margin: 12px; }
  .table-wrap, .att-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .flex.gap-2 { flex-direction: column; width: 100%; }
  .flex.gap-2 .btn { width: 100%; justify-content: center; }
}
@media (max-width: 400px) {
  .stats-grid { grid-template-columns: 1fr; }
  .topbar { padding: 0 12px; }
  .page-header h2 { font-size: 17px; }
}

/* ══════════════════════════════════════════════
   MODAL JITSI FULLSCREEN
══════════════════════════════════════════════ */
#jitsiModal {
  display: none;
  position: fixed; inset: 0; z-index: 9999;
  background: #000;
  flex-direction: column;
}
#jitsiModal.active { display: flex; }
#jitsiModalBar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 18px;
  background: var(--green-900);
  border-bottom: 1px solid var(--green-700);
  flex-shrink: 0;
}

<script>
/* ════════════════════════════════════════════════
   FIREBASE CONFIG
════════════════════════════════════════════════ */
const firebaseConfig = {
  apiKey: "AIzaSyAqwDK_8M6KCYSG2oCuYc6Z8ErlaKrs_kE",
  authDomain: "lms-sence.firebaseapp.com",
  projectId: "lms-sence",
  storageBucket: "lms-sence.firebasestorage.app",
  messagingSenderId: "650163867290",
  appId: "1:650163867290:web:60a7b47c07d876c5fd1923"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();

/* Segunda instancia para crear usuarios sin desloguear al admin */
const secondaryApp  = firebase.initializeApp(firebaseConfig, 'secondary');
const secondaryAuth = secondaryApp.auth();

/* ════════════════════════════════════════════════
   ESTADO GLOBAL
════════════════════════════════════════════════ */
let currentUser = null;
let currentRole = null;
let _teacherClassTimer  = null;
let _teacherRTListener  = null;
let _attendanceListener = null;

/* ════════════════════════════════════════════════
   AUTH
════════════════════════════════════════════════ */
auth.onAuthStateChanged(async (user) => {
  if (user) {
    currentUser = user;
    try {
      const doc = await db.collection('users').doc(user.uid).get();
      currentRole = doc.exists ? (doc.data().role || 'student') : 'student';
    } catch(e) { currentRole = 'student'; }
    showDashboard();
  } else {
    showAuth();
  }
});

function showAuth() {
  document.getElementById('authSection').classList.remove('hidden');
  document.getElementById('dashboardSection').classList.add('hidden');
}
function showDashboard() {
  document.getElementById('authSection').classList.add('hidden');
  document.getElementById('dashboardSection').classList.remove('hidden');
  updateSidebar();
  renderMain();
}

function formatRutInput(input) {
  let v = input.value.replace(/[^0-9kK]/g, '').toUpperCase();
  if (v.length > 1) v = v.slice(0, -1) + '-' + v.slice(-1);
  input.value = v;
}
function rutToEmail(rut) {
  const clean = rut.replace(/-/g,'').replace(/\./g,'').toLowerCase();
  return `rut.${clean}@inasep-lms.cl`;
}
function validarRut(rut) {
  const clean = rut.replace(/\./g,'').replace(/-/g,'');
  if (clean.length < 2) return false;
  const dv = clean.slice(-1).toLowerCase();
  const num = clean.slice(0,-1);
  if (!/^\d+$/.test(num)) return false;
  let suma = 0, mult = 2;
  for (let i = num.length-1; i >= 0; i--) {
    suma += parseInt(num[i]) * mult;
    mult = mult === 7 ? 2 : mult + 1;
  }
  const dvEsp = 11 - (suma % 11);
  const dvCalc = dvEsp===11 ? '0' : dvEsp===10 ? 'k' : String(dvEsp);
  return dv === dvCalc;
}
function rutToPassword(rut) {
  const nums = rut.replace(/[^0-9]/g,'');
  return nums.length >= 6 ? nums.slice(-6) : nums.padEnd(6,'0');
}
function toggleAdminLogin() {
  document.getElementById('loginRutForm').classList.toggle('hidden');
  document.getElementById('loginEmailForm').classList.toggle('hidden');
  document.getElementById('alertAuth').style.display='none';
}
async function loginConRut() {
  const rut  = document.getElementById('loginRut').value.trim();
  const pass = document.getElementById('loginPassword').value;
  if (!rut||!pass) return showAuthAlert('Ingresa tu RUT y contraseña.');
  if (!validarRut(rut)) return showAuthAlert('RUT inválido. Verifica el formato (Ej: 12345678-9).');
  try {
    await auth.signInWithEmailAndPassword(rutToEmail(rut), pass);
  } catch(err) {
    const msgs = {
      'auth/user-not-found':'RUT no registrado. Contacta al administrador.',
      'auth/wrong-password':'Contraseña incorrecta.',
      'auth/invalid-credential':'RUT o contraseña incorrectos.',
      'auth/too-many-requests':'Demasiados intentos. Espera unos minutos.'
    };
    showAuthAlert(msgs[err.code]||'Error al iniciar sesión.');
  }
}
async function loginConEmail() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPasswordAdmin').value;
  if (!email||!pass) return showAuthAlert('Completa todos los campos.');
  try {
    await auth.signInWithEmailAndPassword(email, pass);
  } catch(err) {
    const msgs = {
      'auth/user-not-found':'Usuario no encontrado.',
      'auth/wrong-password':'Contraseña incorrecta.',
      'auth/invalid-credential':'Credenciales inválidas.',
      'auth/too-many-requests':'Demasiados intentos.'
    };
    showAuthAlert(msgs[err.code]||'Error al iniciar sesión.');
  }
}
function logout() { auth.signOut(); }
function showAuthAlert(msg) {
  const el = document.getElementById('alertAuth');
  el.textContent = msg; el.className = 'alert alert-error'; el.style.display='block';
}
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const af = document.getElementById('authSection');
  if (!af || af.classList.contains('hidden')) return;
  const rutVisible = !document.getElementById('loginRutForm').classList.contains('hidden');
  if (rutVisible) loginConRut(); else loginConEmail();
});

/* ════════════════════════════════════════════════
   SIDEBAR
════════════════════════════════════════════════ */
function updateSidebar() {
  const name     = currentUser?.displayName || currentUser?.email?.split('@')[0] || 'Usuario';
  const email    = currentUser?.email || '';
  const initials = name.slice(0,2).toUpperCase();
  document.getElementById('sbName').textContent    = name;
  document.getElementById('sbEmail').textContent   = email;
  const roleLabel = currentRole==='admin' ? 'Administrador' : currentRole==='teacher' ? 'Profesor' : 'Alumno';
  const roleBadge = currentRole==='admin' ? 'badge-green' : currentRole==='teacher' ? 'badge-orange' : 'badge-blue';
  document.getElementById('sbRole').innerHTML = `<span class="badge ${roleBadge}">${roleLabel}</span>`;
  document.getElementById('topbarName').textContent = name;
  document.getElementById('topbarAvatar').textContent = initials;

  const isAdmin   = currentRole === 'admin';
  const isTeacher = currentRole === 'teacher';
  const links = isAdmin ? [
    { label:'📊 Panel',           view:'dashboard'        },
    { label:'📹 Clases en Vivo',  view:'live-classes'     },
    { label:'➕ Nueva Clase',     view:'new-class'        },
    { label:'🎓 Alumnos',         view:'alumnos'          },
    { label:'👨‍🏫 Profesores',      view:'profesores'       },
    { label:'👥 Asistencia',      view:'attendance'       },
    { label:'📊 Reportes',        view:'reports'          },
    { label:'🗓️ Horario',         view:'schedule'         },
  ] : isTeacher ? [
    { label:'📹 Mis Clases',      view:'live-classes'     },
    { label:'👥 Asistencia Hoy',  view:'teacher-attendance'},
    { label:'📊 Reportes',        view:'teacher-reports'  },
  ] : [
    { label:'🏠 Mis Cursos',      view:'my-courses'       },
    { label:'📹 Clases en Vivo',  view:'live-classes'     },
    { label:'📋 Mi Asistencia',   view:'my-attendance'    },
  ];
  document.getElementById('sidebarNav').innerHTML = links.map(l =>
    `<a onclick="navigate('${l.view}')" id="nav-${l.view}">${l.label}</a>`
  ).join('');
}
function openSidebar()  { document.getElementById('sidebar').classList.add('open'); document.getElementById('mobOverlay').classList.add('active'); }
function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('mobOverlay').classList.remove('active'); }

/* ════════════════════════════════════════════════
   ROUTER
════════════════════════════════════════════════ */
let currentView = '';
function navigate(view, params={}) {
  if (currentView === 'teacher-room' && view !== 'teacher-room') {
    if (_teacherClassTimer) { clearInterval(_teacherClassTimer); _teacherClassTimer = null; }
    if (_teacherRTListener) { _teacherRTListener(); _teacherRTListener = null; }
  }
  if (_attendanceListener) { _attendanceListener(); _attendanceListener = null; }
  currentView = view;
  closeSidebar();
  document.querySelectorAll('.sidebar-nav a').forEach(a => a.classList.remove('active'));
  const navEl = document.getElementById('nav-' + view.split('/')[0]);
  if (navEl) navEl.classList.add('active');
  renderMain(view, params);
}
function renderMain(view, params={}) {
  if (!view) view = currentRole==='admin' ? 'dashboard' : currentRole==='teacher' ? 'live-classes' : 'my-courses';
  currentView = view;
  const mc = document.getElementById('mainContent');
  mc.innerHTML = '<div class="empty-state"><div class="icon">⏳</div><p>Cargando...</p></div>';

  const views = {
    'dashboard':           renderAdminDashboard,
    'live-classes':        renderLiveClasses,
    'new-class':           renderNewClass,
    'attendance':          renderAttendance,
    'reports':             renderReports,
    'schedule':            renderSchedule,
    'alumnos':             renderAlumnos,
    'profesores':          renderProfesores,
    'teacher-attendance':  renderTeacherAttendance,
    'teacher-reports':     renderTeacherReports,
    'my-courses':          renderMyCourses,
    'my-attendance':       renderMyAttendance,
    'class-room':          renderClassRoom,
    'teacher-room':        renderTeacherRoom,
  };
  const fn = views[view.split('/')[0]];
  if (fn) fn(mc, params);
  else mc.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><p>Vista no encontrada.</p></div>';
}

/* ════════════════════════════════════════════════
   TOAST / MODAL
════════════════════════════════════════════════ */
function toast(msg, type='info', dur=4000) {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span>${msg}</span>`;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(() => el.remove(), dur);
}
function openModal(html, wide=false) {
  document.getElementById('modalContainer').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal ${wide?'modal-wide':''}">
        ${html}
      </div>
    </div>`;
}
function closeModal() { document.getElementById('modalContainer').innerHTML=''; }

/* ════════════════════════════════════════════════
   UTILIDADES
════════════════════════════════════════════════ */
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDate(ts) {
  if (!ts) return '—';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('es-CL',{day:'2-digit',month:'2-digit',year:'numeric'});
}
function fmtDateTime(ts) {
  if (!ts) return '—';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('es-CL',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
}
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function pctClass(p) { return p>=80?'good':p>=60?'warning':'danger'; }

/* ════════════════════════════════════════════════
   VISTA: DASHBOARD ADMIN
════════════════════════════════════════════════ */
async function renderAdminDashboard(mc) {
  try {
    const [classSnap, usersSnap, attSnap] = await Promise.all([
      db.collection('liveClasses').get(),
      db.collection('users').get(),
      db.collection('attendance').where('date','==',todayStr()).get()
    ]);
    const totalClasses  = classSnap.size;
    const activeClasses = classSnap.docs.filter(d=>d.data().status==='active').length;
    const totalAlumnos  = usersSnap.docs.filter(d=>d.data().role==='student').length;
    const totalProfes   = usersSnap.docs.filter(d=>d.data().role==='teacher').length;
    const presentesHoy  = attSnap.docs.filter(d=>d.data().present===true).length;

    mc.innerHTML = `
      <div class="page-header">
        <div><h2>📊 Panel de Control</h2><div class="breadcrumb">INASEP — Clases en Vivo</div></div>
        <button class="btn btn-primary" onclick="navigate('new-class')">➕ Nueva Clase</button>
      </div>
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-icon">📹</div><div class="stat-value">${totalClasses}</div><div class="stat-label">Total Clases</div></div>
        <div class="stat-card"><div class="stat-icon">🔴</div><div class="stat-value">${activeClasses}</div><div class="stat-label">Clases Activas</div></div>
        <div class="stat-card"><div class="stat-icon">🎓</div><div class="stat-value">${totalAlumnos}</div><div class="stat-label">Alumnos</div></div>
        <div class="stat-card"><div class="stat-icon">👨‍🏫</div><div class="stat-value">${totalProfes}</div><div class="stat-label">Profesores</div></div>
        <div class="stat-card"><div class="stat-icon">✅</div><div class="stat-value">${presentesHoy}</div><div class="stat-label">Presentes Hoy</div></div>
      </div>

      <div class="card">
        <div class="card-header"><h3>📹 Clases Recientes</h3><button class="btn btn-sm btn-primary" onclick="navigate('live-classes')">Ver Todas</button></div>
        <div id="recentClasses"><div class="empty-state"><div class="icon">⏳</div><p>Cargando...</p></div></div>
      </div>

      <div class="card">
        <div class="card-header"><h3>✅ Asistencia de Hoy — ${new Date().toLocaleDateString('es-CL',{weekday:'long',day:'numeric',month:'long'})}</h3>
          <button class="btn btn-sm btn-secondary" onclick="navigate('attendance')">Ver Completa</button>
        </div>
        <div id="todayAttendance"><div class="empty-state"><div class="icon">⏳</div><p>Cargando...</p></div></div>
      </div>`;

    // Clases recientes
    const recentSnap = await db.collection('liveClasses').limit(20).get();
    const rc = document.getElementById('recentClasses');
    if (recentSnap.empty) { rc.innerHTML='<div class="empty-state"><div class="icon">📭</div><p>No hay clases creadas aún.</p></div>'; }
    else {
      rc.innerHTML = `<div class="table-wrap"><table>
        <thead><tr><th>Título</th><th>Fecha</th><th>Duración</th><th>Estado</th><th></th></tr></thead>
        <tbody>${recentSnap.docs.map(d=>{
          const c=d.data(); const isLive=c.status==='active';
          return `<tr>
            <td><strong>${escHtml(c.title)}</strong></td>
            <td style="font-size:12px">${fmtDateTime(c.scheduledAt)}</td>
            <td>${c.duration||60} min</td>
            <td><span class="badge ${isLive?'badge-live':c.status==='finished'?'badge-gray':'badge-blue'}">${isLive?'🔴 En Vivo':c.status==='finished'?'✅ Finalizada':'📅 Programada'}</span></td>
            <td><button class="btn btn-sm btn-secondary" onclick="navigate('teacher-room',{id:'${d.id}'})">Entrar</button></td>
          </tr>`;}).join('')}
        </tbody></table></div>`;
    }

    // Asistencia hoy
    const todayAtt = document.getElementById('todayAttendance');
    if (attSnap.empty) { todayAtt.innerHTML='<div class="empty-state"><div class="icon">📭</div><p>Sin registros de asistencia hoy.</p></div>'; }
    else {
      const byClass = {};
      attSnap.docs.forEach(d => {
        const a = d.data();
        if (!byClass[a.classId]) byClass[a.classId] = { title:a.classTitle||'—', presentes:0, total:0 };
        byClass[a.classId].total++;
        if (a.present) byClass[a.classId].presentes++;
      });
      todayAtt.innerHTML = `<div class="table-wrap"><table>
        <thead><tr><th>Clase</th><th>Presentes</th><th>%</th></tr></thead>
        <tbody>${Object.values(byClass).map(b=>{
          const pct = b.total > 0 ? Math.round((b.presentes/b.total)*100) : 0;
          return `<tr><td>${escHtml(b.title)}</td><td>${b.presentes}/${b.total}</td>
            <td><span class="att-pct ${pctClass(pct)}">${pct}%</span></td></tr>`;
        }).join('')}</tbody></table></div>`;
    }
  } catch(e) {
    mc.innerHTML = `<div class="empty-state"><div class="icon">❌</div><p>${escHtml(e.message)}</p></div>`;
  }
}

/* ════════════════════════════════════════════════
   VISTA: CLASES EN VIVO (todos los roles)
════════════════════════════════════════════════ */
async function renderLiveClasses(mc) {
  const isAdmin   = currentRole==='admin';
  const isTeacher = currentRole==='teacher';

  mc.innerHTML = `
    <div class="page-header">
      <div><h2>📹 Clases en Vivo</h2><div class="breadcrumb">Clases disponibles</div></div>
      ${isAdmin ? '<button class="btn btn-primary" onclick="navigate(\'new-class\')">➕ Nueva Clase</button>' : ''}
    </div>
    <div id="classesContainer"><div class="empty-state"><div class="icon">⏳</div><p>Cargando...</p></div></div>`;

  try {
    const snap = await db.collection('liveClasses').get();

    const cont = document.getElementById('classesContainer');
    if (snap.empty) { cont.innerHTML='<div class="empty-state"><div class="icon">📭</div><p>No hay clases disponibles.</p></div>'; return; }

    const sortedDocs = snap.docs.sort((a,b) => {
      const ta = a.data().scheduledAt?.toDate?.()?.getTime() || 0;
      const tb = b.data().scheduledAt?.toDate?.()?.getTime() || 0;
      return tb - ta;
    });

    cont.innerHTML = sortedDocs.map(doc => {
      const c = doc.data();
      const isLive = c.status==='active';
      const isDone = c.status==='finished';
      return `
        <div class="live-class-card">
          <div class="live-class-header">
            <h4>${escHtml(c.title)}</h4>
            <span class="badge ${isLive?'badge-live':isDone?'badge-gray':'badge-blue'}">
              ${isLive?'🔴 EN VIVO':isDone?'✅ Finalizada':'📅 Programada'}
            </span>
          </div>
          <div class="live-class-body">
            <div class="live-class-meta">
              <span>📅 ${fmtDateTime(c.scheduledAt)}</span>
              <span>⏱ ${c.duration||60} min</span>
              ${c.courseName ? `<span>🎓 ${escHtml(c.courseName)}</span>` : ''}
              ${c.teacherName ? `<span>👨‍🏫 ${escHtml(c.teacherName)}</span>` : ''}
            </div>
            ${c.description ? `<p style="font-size:13px;color:var(--text-mid);margin-bottom:12px">${escHtml(c.description)}</p>` : ''}
            <div class="live-class-actions">
              ${isTeacher||isAdmin ? `
                <button class="btn ${isLive?'btn-live':'btn-primary'}" onclick="iniciarSalaProfesor('${doc.id}','${escHtml(c.title)}','${escHtml(c.jitsiRoom||'')}','${c.videoType||''}','${escHtml(c.videoUrl||'')}')">
                  ${isLive?'🔴 Entrar a Clase':'▶️ Iniciar Clase'}
                </button>
                <button class="btn btn-sm btn-${isLive?'warning':'success'}" onclick="toggleClassStatus('${doc.id}','${c.status}')">
                  ${isLive?'⏹ Finalizar':'📡 Activar EN VIVO'}
                </button>
                ${isAdmin ? `
                  <button class="btn btn-sm btn-secondary" onclick="editClass('${doc.id}')">✏️ Editar</button>
                  <button class="btn btn-sm btn-danger" onclick="deleteClass('${doc.id}')">🗑️</button>
                ` : ''}
              ` : `
                <button class="btn ${isLive?'btn-live':'btn-primary'}" onclick="navigate('class-room',{id:'${doc.id}'})">
                  ${isLive?'🔴 Entrar a Clase EN VIVO':'👁️ Ver Clase'}
                </button>
              `}
            </div>
          </div>
        </div>`;
    }).join('');
  } catch(e) {
    document.getElementById('classesContainer').innerHTML = `<div class="empty-state"><div class="icon">❌</div><p>${escHtml(e.message)}</p></div>`;
  }
}

function updateVideoFields() {
  const type  = document.getElementById('fc_videoType')?.value;
  const label = document.getElementById('videoUrlLabel');
  const help  = document.getElementById('videoUrlHelp');
  const jitsi = document.getElementById('jitsiConfig');
  const hints = {
    youtube: ['URL YouTube Live / Embed', 'Ej: https://www.youtube.com/watch?v=XXXXX'],
    meet:    ['URL Google Meet', 'Ej: https://meet.google.com/xxx-xxxx-xxx'],
    zoom:    ['URL Zoom', 'Ej: https://us02web.zoom.us/j/XXXXXXXXX'],
    teams:   ['URL Microsoft Teams', 'Pega el enlace de unión a la reunión'],
    jitsi:   ['URL Jitsi (opcional)', 'Déjala vacía para usar el nombre de sala'],
    custom:  ['URL personalizada', 'Cualquier URL compatible con iframe']
  };
  const [l,h] = hints[type]||hints.custom;
  if (label) label.textContent = l;
  if (help)  help.textContent  = h;
  if (jitsi) jitsi.classList.toggle('hidden', type!=='jitsi');
}

async function saveClass(id) {
  const title       = document.getElementById('fc_title').value.trim();
  const courseName  = document.getElementById('fc_courseName').value.trim();
  const description = document.getElementById('fc_desc').value.trim();
  const dateVal     = document.getElementById('fc_date').value;
  const duration    = parseInt(document.getElementById('fc_duration').value)||60;
  const status      = document.getElementById('fc_status').value;
  const videoType   = document.getElementById('fc_videoType').value;
  let   videoUrl    = document.getElementById('fc_videoUrl').value.trim();
  const jitsiRoom   = document.getElementById('fc_jitsiRoom')?.value.trim()||'';
  const teacherSel  = document.getElementById('fc_teacher');
  const teacherUid  = teacherSel?.value||'';
  const teacherName = teacherUid ? (teacherSel.selectedOptions[0]?.getAttribute('data-name')||'') : '';

  if (videoType==='jitsi' && !videoUrl && jitsiRoom)
    videoUrl = `https://meet.jit.si/${encodeURIComponent(jitsiRoom)}`;

  if (!title||title.length<3) return toast('⚠️ El título debe tener al menos 3 caracteres.','warning');
  if (!dateVal) return toast('⚠️ Selecciona fecha y hora.','warning');

  const data = {
    title, courseName, description,
    scheduledAt: firebase.firestore.Timestamp.fromDate(new Date(dateVal)),
    duration, status, videoType, videoUrl, jitsiRoom,
    teacherUid, teacherName,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
    createdBy: currentUser.uid
  };
  try {
    if (id) {
      await db.collection('liveClasses').doc(id).update(data);
      toast('✅ Clase actualizada.','success');
    } else {
      data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
      await db.collection('liveClasses').add(data);
      toast('✅ Clase creada correctamente.','success');
    }
    navigate('live-classes');
  } catch(e) { toast('❌ Error: '+e.message,'error'); }
}

async function editClass(id) {
  const doc = await db.collection('liveClasses').doc(id).get();
  if (doc.exists) navigate('new-class',{id,data:{id,...doc.data()}});
}
async function deleteClass(id) {
  if (!confirm('¿Eliminar esta clase y todos sus registros de asistencia?')) return;
  const batch = db.batch();
  const attSnap = await db.collection('attendance').where('classId','==',id).get();
  attSnap.docs.forEach(d=>batch.delete(d.ref));
  batch.delete(db.collection('liveClasses').doc(id));
  await batch.commit();
  toast('🗑️ Clase eliminada.','success');
  navigate('live-classes');
}
async function toggleClassStatus(id, current) {
  if (currentRole !== 'admin' && currentRole !== 'teacher') {
    toast('⛔ Sin permisos para cambiar el estado de la clase.', 'error');
    return;
  }
  const newStatus = current==='active' ? 'finished' : 'active';
  await db.collection('liveClasses').doc(id).update({status:newStatus, updatedAt:firebase.firestore.FieldValue.serverTimestamp()});
  toast(`✅ Clase ${newStatus==='active'?'activada en vivo':'finalizada'}.`,'success');
  navigate('live-classes');
}

  const classId = params.id;

  const cls = doc.data();

  // Buscar asistencia del alumno hoy
  const today = todayStr();
  const attSnap = await db.collection('attendance')
    .where('classId','==',classId)
    .where('userId','==',currentUser.uid)
    .where('date','==',today)
    .limit(1).get();

  if (cls.videoType==='jitsi' && cls.jitsiRoom) {
    // Jitsi: botón que abre en pestaña nueva (iframe bloquea cámara/micrófono en muchos navegadores)
    const jitsiUrl = `https://meet.jit.si/${encodeURIComponent(cls.jitsiRoom)}`;
    videoEmbed = `
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;gap:16px;background:var(--green-900);min-height:220px">
        <div style="font-size:48px">📡</div>
        <div style="color:#fff;font-size:17px;font-weight:600;text-align:center">${escHtml(cls.title)}</div>
        <div style="color:var(--green-200);font-size:13px">La clase está en vivo. Haz clic para entrar.</div>
        <a href="${escHtml(jitsiUrl)}" target="_blank" rel="noopener noreferrer"
           style="background:var(--primary);color:#fff;padding:14px 32px;border-radius:var(--radius);font-size:16px;font-weight:700;text-decoration:none;display:inline-flex;align-items:center;gap:8px;margin-top:4px">
          🎥 Entrar a la Sala de Clases ↗
        </a>
        <div style="color:rgba(255,255,255,0.35);font-size:11px;font-family:'DM Mono'">meet.jit.si/${escHtml(cls.jitsiRoom)}</div>
      </div>`;
  } else if (cls.videoUrl) {
    let embedUrl = cls.videoUrl;
    if (cls.videoType==='youtube') {
      const ytMatch = cls.videoUrl.match(/(?:v=|youtu\.be\/)([^&?]+)/);
      if (ytMatch) embedUrl = `https://www.youtube.com/embed/${ytMatch[1]}?autoplay=0`;
    }
    videoEmbed = `<iframe class="video-frame" src="${escHtml(embedUrl)}" allow="camera;microphone;fullscreen;display-capture;autoplay" allowfullscreen></iframe>`;
  } else {
    videoEmbed = `<div class="video-placeholder"><div class="icon">📡</div><p>El enlace de videoconferencia aún no está disponible.</p></div>`;
  }

  mc.innerHTML = `
    <div class="page-header">
      <div>
        <h2>${escHtml(cls.title)}</h2>
        <div class="breadcrumb"><a onclick="navigate('live-classes')">← Clases</a> › ${escHtml(cls.title)}</div>
      </div>
      ${cls.status==='active' ? '<span class="badge badge-live">🔴 EN VIVO</span>' : ''}
    </div>

    <!-- CHECKBOX DE ASISTENCIA -->
    <div class="attendance-check-box ${isPresent?'checked':''}" id="attCheckBox">
      <span class="check-label">📋 Registro de Asistencia — ${new Date().toLocaleDateString('es-CL',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</span>
      <div class="check-wrapper">
        <input type="checkbox" class="big-check" id="attendanceCheck"
               ${isPresent?'checked':''} ${isPresent?'disabled':''}
               onchange="marcarAsistencia('${classId}', '${escHtml(cls.title)}', this)">
        <div class="check-text">
          <strong>${isPresent ? '✅ Asistencia Registrada' : 'Marcar mi asistencia de hoy'}</strong>
          ${isPresent
            ? `<span style="color:var(--success)">Tu asistencia fue registrada correctamente.</span>`
            : `<span>Haz clic para confirmar que estás presente en esta clase.</span>`
          }
          ${checkedTime ? `<div class="attendance-time-stamp">Registrado: ${checkedTime}</div>` : ''}
        </div>
      </div>
      ${!isPresent && cls.status==='active' ? `<p style="font-size:12px;color:var(--warning);margin-top:10px">⚠️ Solo puedes marcar asistencia mientras la clase está EN VIVO.</p>` : ''}
      ${!isPresent && cls.status!=='active' ? `<p style="font-size:12px;color:var(--danger);margin-top:10px">⛔ La clase no está activa. No puedes marcar asistencia ahora.</p>` : ''}

    <div class="card" style="padding:0;overflow:hidden">

        Abrir Videoconferencia en Nueva Pestaña ↗
      </a>
    </div>` : ''}`;

  // Deshabilitar checkbox si la clase no está activa y no ha marcado
  if (!isPresent && cls.status!=='active') {
    const chk = document.getElementById('attendanceCheck');
    if (chk) chk.disabled = true;
  }
}

async function marcarAsistencia(classId, classTitle, checkbox) {
  // Verificar que la clase está activa
  const clsDoc = await db.collection('liveClasses').doc(classId).get();
  if (!clsDoc.exists || clsDoc.data().status !== 'active') {
    toast('⛔ La clase no está activa. No puedes marcar asistencia ahora.','error');
    checkbox.checked = false;
    return;
  }

  if (!checkbox.checked) return; // solo registramos al marcar, no al desmarcar

  checkbox.disabled = true;
  const today = todayStr();
  try {
    // Obtener datos del usuario
    const userDoc = await db.collection('users').doc(currentUser.uid).get();
    const userData = userDoc.exists ? userDoc.data() : {};

    await db.collection('attendance').add({
      classId, classTitle,
      userId:      currentUser.uid,
      userName:    currentUser.displayName || userData.name || currentUser.email,
      userRut:     userData.rut || '',
      date:        today,
      present:     true,
      checkedAt:   firebase.firestore.FieldValue.serverTimestamp(),
      online:      true,
    });

    // Actualizar lastSeen para presencia online
    await db.collection('users').doc(currentUser.uid).update({
      lastSeen: firebase.firestore.FieldValue.serverTimestamp(),
      lastClassId: classId,
    });

    const box = document.getElementById('attCheckBox');
    if (box) {
      box.classList.add('checked');
      box.querySelector('.check-text strong').textContent = '✅ Asistencia Registrada';
      box.querySelector('.check-text span').textContent = 'Tu asistencia fue registrada correctamente.';
    }
    toast('✅ ¡Asistencia registrada! Bienvenido a la clase.','success');
  } catch(e) {
    toast('❌ Error al registrar asistencia: '+e.message,'error');
    checkbox.checked = false;
    checkbox.disabled = false;
  }
}

    </div>

    <!-- ACCESO VIDEOCONFERENCIA -->
    <div class="card" style="margin-bottom:16px">
      <div class="card-header"><h3>🎥 Videoconferencia</h3></div>
      <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:center;padding:4px 0">
        ${cls.videoType==='jitsi' ? `
          <button class="btn btn-primary" style="font-size:15px;padding:12px 24px" onclick="abrirJitsiModal('${classId}','${escHtml(cls.title)}','${escHtml(cls.jitsiRoom||'')}')">
            📡 Abrir Sala Jitsi (pantalla completa)
          </button>
          <span style="font-size:12px;color:var(--text-mid)">Sala: <strong style="font-family:'DM Mono'">${escHtml(cls.jitsiRoom||'—')}</strong></span>
        ` : cls.videoUrl ? `
          <a href="${escHtml(cls.videoUrl)}" target="_blank" rel="noopener" class="btn btn-primary" style="font-size:15px;padding:12px 24px">
            🎥 Abrir Videoconferencia ↗
          </a>
        ` : `<p style="color:var(--text-light);font-size:13px">Sin videoconferencia configurada.</p>`}
      </div>
    </div>

    <!-- BOTÓN SALIR -->
    <div style="display:flex;gap:12px;flex-wrap:wrap">
      <button class="btn btn-secondary" onclick="salirDeSala()">🚪 Salir de la Sala</button>
    </div>`;

  // Iniciar timer
  _teacherClassStart = new Date();
  _teacherClassTimer = setInterval(() => {
    const secs = Math.floor((new Date() - _teacherClassStart) / 1000);
    const h = String(Math.floor(secs/3600)).padStart(2,'0');
    const m = String(Math.floor((secs%3600)/60)).padStart(2,'0');
    const s = String(secs%60).padStart(2,'0');
    const el = document.getElementById('teacherTimer');
    if (el) el.textContent = `${h}:${m}:${s}`;
    else { clearInterval(_teacherClassTimer); _teacherClassTimer=null; }
  }, 1000);

  // Cargar alumnos en tiempo real
  cargarAlumnosRT(classId);
}

function cargarAlumnosRT(classId) {
  const cont = document.getElementById('teacherAlumnosRT');
  if (!cont) return;
  if (_teacherRTListener) _teacherRTListener();

  _teacherRTListener = db.collection('attendance')
    .where('classId','==',classId)
    .where('date','==',todayStr())
    .onSnapshot(snap => {
      const cont2 = document.getElementById('teacherAlumnosRT');
      if (!cont2) { if(_teacherRTListener){_teacherRTListener();_teacherRTListener=null;} return; }
      if (snap.empty) {
        cont2.innerHTML='<div class="empty-state"><div class="icon">📭</div><p>Ningún alumno ha marcado asistencia hoy.</p></div>'; return;
      }
      cont2.innerHTML = `
        <div style="margin-bottom:10px;display:flex;gap:14px;align-items:center;flex-wrap:wrap">
          <span style="font-size:13px;color:var(--text-mid)">Total: <strong>${snap.size}</strong></span>
          <span class="badge badge-green">✅ Presentes: ${snap.docs.filter(d=>d.data().present).length}</span>
        </div>
        <div class="table-wrap"><table>
          <thead><tr><th>Alumno</th><th>RUT</th><th>Estado</th><th>Hora de Registro</th><th>Online</th></tr></thead>
          <tbody>${snap.docs.map(d=>{
            const a=d.data();
            const online = a.online && a.checkedAt && (new Date()-a.checkedAt.toDate?.()||0)<600000;
            return `<tr>
              <td><div style="display:flex;align-items:center;gap:8px">
                <div class="participant-avatar" style="width:28px;height:28px;border-radius:50%;background:var(--green-500);color:#fff;font-weight:700;font-size:11px;display:inline-flex;align-items:center;justify-content:center">${(a.userName||'?').slice(0,2).toUpperCase()}</div>
                <strong>${escHtml(a.userName||'—')}</strong>
              </div></td>
              <td><span style="font-family:'DM Mono';font-size:12px">${escHtml(a.userRut||'—')}</span></td>
              <td><span class="badge badge-green">✅ Presente</span></td>
              <td style="font-size:12px">${fmtDateTime(a.checkedAt)}</td>
              <td><span class="${online?'online-dot':'offline-dot'}"></span>${online?'Online':'—'}</td>
            </tr>`;
          }).join('')}</tbody></table></div>`;
    }, err=>{
      const c=document.getElementById('teacherAlumnosRT');
      if(c) c.innerHTML=`<p style="color:var(--danger);padding:12px">${err.message}</p>`;
    });
}

function recargarAlumnosRT(classId) {
  if (_teacherRTListener) { _teacherRTListener(); _teacherRTListener=null; }
  cargarAlumnosRT(classId);
}

async function salirDeSala() {
  if (_teacherClassTimer) { clearInterval(_teacherClassTimer); _teacherClassTimer=null; }
  if (_teacherRTListener) { _teacherRTListener(); _teacherRTListener=null; }
  if (_teacherSessionDocId && _teacherClassStart) {
    try {
      const durSeg = Math.floor((new Date()-_teacherClassStart)/1000);
      await db.collection('teacherSessions').doc(_teacherSessionDocId).update({
        salidaAt: firebase.firestore.FieldValue.serverTimestamp(),
        duracionSeg: durSeg,
      });
    } catch(e) {}
    _teacherSessionDocId=null;
  }
  toast('🚪 Salida registrada.','info');
  navigate('live-classes');
}

async function cargarTablaAsistencia() {
  const cont = document.getElementById('attTableContainer');
  if (!cont) return;
  cont.innerHTML='<div class="empty-state"><div class="icon">⏳</div><p>Cargando...</p></div>';

  const classId  = document.getElementById('attFilterClass')?.value||'';
  const date     = document.getElementById('attFilterDate')?.value||todayStr();

  try {
    // Obtener todos los alumnos
    const alumnosSnap = await db.collection('users').where('role','==','student').get();
    const alumnosDocs = alumnosSnap.docs.sort((a,b)=>(a.data().name||'').localeCompare(b.data().name||'','es'));

    // Obtener asistencia del día
    let attQuery = db.collection('attendance').where('date','==',date);
    if (classId) attQuery = attQuery.where('classId','==',classId);
    const attSnap = await attQuery.get();

    // Mapa userId → asistencia
    const attMap = {};
    attSnap.docs.forEach(d => {
      const a=d.data();
      const key = classId ? a.userId : `${a.userId}__${a.classId}`;
      attMap[key] = a;
    });

    if (alumnosDocs.length === 0) {
      cont.innerHTML='<div class="empty-state"><div class="icon">📭</div><p>No hay alumnos registrados.</p></div>'; return;
    }

    const dateFormatted = new Date(date+'T12:00:00').toLocaleDateString('es-CL',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

    cont.innerHTML = `
      <div class="card">
        <div class="card-header">
          <h3>📋 Asistencia — ${escHtml(dateFormatted)}</h3>
          <span class="badge badge-blue">${attSnap.docs.filter(d=>d.data().present).length} presentes</span>
        </div>
        <div class="table-wrap"><table>
          <thead><tr><th>Alumno</th><th>RUT</th><th>Estado</th><th>Hora</th><th>Online</th></tr></thead>
          <tbody>${alumnosDocs.map(d=>{
            const u=d.data();
            const att = classId ? attMap[u.uid||d.id] : Object.values(attMap).find(a=>a.userId===(u.uid||d.id));
            const present = att?.present===true;
            const online  = att?.online && att?.checkedAt && (new Date()-att.checkedAt.toDate?.()||0)<600000;
            return `<tr>
              <td><div style="display:flex;align-items:center;gap:8px">
                <div style="width:28px;height:28px;border-radius:50%;background:${present?'var(--success)':'#ccc'};color:#fff;font-weight:700;font-size:11px;display:inline-flex;align-items:center;justify-content:center">${(u.name||'?').slice(0,2).toUpperCase()}</div>
                <strong>${escHtml(u.name||'—')}</strong>
              </div></td>
              <td><span style="font-family:'DM Mono';font-size:12px">${escHtml(u.rut||'—')}</span></td>
              <td><span class="badge ${present?'badge-green':'badge-gray'}">${present?'✅ Presente':'— Ausente'}</span></td>
              <td style="font-size:12px">${att?.checkedAt ? fmtDateTime(att.checkedAt) : '—'}</td>
              <td><span class="${online?'online-dot':'offline-dot'}"></span>${online?'Online':'—'}</td>
            </tr>`;
          }).join('')}</tbody></table></div>
      </div>`;
  } catch(e) {
    cont.innerHTML=`<div class="empty-state"><div class="icon">❌</div><p>${escHtml(e.message)}</p></div>`;
  }
}

let _reportData = null;
let _reportTitle = '';

function updateReportForm() {
  // Ajustar form según tipo — por ahora todos tienen mismos campos

async function previewReport() {
  const type    = document.getElementById('rpt_type').value;
  const classId = document.getElementById('rpt_class').value;
  const from    = document.getElementById('rpt_date_from').value;
  const to      = document.getElementById('rpt_date_to').value;

  const previewDiv = document.getElementById('reportPreview');
  const previewCont = document.getElementById('reportPreviewContent');
  previewCont.innerHTML='<div class="empty-state"><div class="icon">⏳</div><p>Cargando...</p></div>';
  previewDiv.style.display='block';

  try {
    // Obtener alumnos
    const alumnosSnap = await db.collection('users').where('role','==','student').get();
    const alumnos = alumnosSnap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(a.name||'').localeCompare(b.name||'','es'));

    // Obtener clases
    let clsQuery = db.collection('liveClasses');
    if (classId) clsQuery = db.collection('liveClasses').where(firebase.firestore.FieldPath.documentId(),'==',classId);
    const clsSnap  = await (classId ? db.collection('liveClasses').doc(classId).get() : db.collection('liveClasses').get());
    const clases   = classId ? (clsSnap.exists ? [{id:classId,...clsSnap.data()}] : []) : clsSnap.docs.map(d=>({id:d.id,...d.data()}));

    // Obtener asistencias en rango
    let attQuery = db.collection('attendance').where('date','>=',from).where('date','<=',to);
    if (classId) attQuery = attQuery.where('classId','==',classId);
    const attSnap  = await attQuery.get();
    const attDocs  = attSnap.docs.map(d=>({id:d.id,...d.data()}));

    // Obtener fechas únicas
    const allDates = [...new Set(attDocs.map(a=>a.date))].sort();

    if (type==='clase_dia' || type==='resumen_clase') {
      // Tabla: filas = alumnos, columnas = fechas
      _reportTitle = `Asistencia${classId?' — '+clases[0]?.title:' — Todas las Clases'} (${from} al ${to})`;
      const rows = alumnos.map(al => {
        const diasPresente = allDates.map(d => {
          const att = attDocs.find(a=>a.userId===al.id&&a.date===d&&(classId?a.classId===classId:true));
          return att?.present===true;
        });
        const total = diasPresente.filter(Boolean).length;
        const pct   = allDates.length>0 ? Math.round((total/allDates.length)*100) : 0;
        return { nombre:al.name||'—', rut:al.rut||'—', dias:diasPresente, total, pct };
      });
      _reportData = { type:'tabla_diaria', title:_reportTitle, dates:allDates, rows, classTitle:clases[0]?.title||'Todas' };

      previewCont.innerHTML = rows.length===0
        ? '<div class="empty-state"><div class="icon">📭</div><p>Sin datos.</p></div>'
        : `<div class="att-table-wrap"><table class="att-table">
          <thead>
            <tr>
              <th>Alumno</th><th>RUT</th>
              ${allDates.map(d=>`<th style="white-space:nowrap">${d.slice(5)}</th>`).join('')}
              <th>Total</th><th>%</th>
            </tr>

async function exportTeacherReport() {

  try {
    toast('⏳ Generando reporte...','info',3000);
    const clsSnap = await db.collection('liveClasses').where('teacherUid','==',currentUser.uid).get();
    const myIds   = clsSnap.docs.map(d=>d.id);

    const attSnap = await db.collection('attendance')
      .where('classId','in',myIds.slice(0,10))
      .where('date','>=',from).where('date','<=',to).get();
    const attDocs = attSnap.docs.map(d=>({id:d.id,...d.data()}));

    const dates = [...new Set(attDocs.map(a=>a.date))].sort();

async function readScheduleFile(input) {
  const file = input.files[0];
  if (!file) return;
  const prev = document.getElementById('schedPreview');
  prev.innerHTML='<p style="font-size:13px;color:var(--text-mid)">⏳ Leyendo archivo...</p>';

  try {
    const data = await file.arrayBuffer();
    const wb   = XLSX.read(data, {type:'array'});
    const ws   = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, {defval:''});

    if (!rows.length) { prev.innerHTML='<p style="color:var(--danger)">❌ El archivo está vacío.</p>'; return; }

    // Mapear columnas flexiblemente
    const dayMap    = {dia:'day',día:'day',day:'day'};
    const startMap  = {'hora inicio':'timeStart','hora_inicio':'timeStart','start':'timeStart','inicio':'timeStart','hora inicio':'timeStart'};
    const endMap    = {'hora fin':'timeEnd','hora_fin':'timeEnd','end':'timeEnd','fin':'timeEnd','término':'timeEnd','termino':'timeEnd'};
    const subjMap   = {materia:'subject',asignatura:'subject',módulo:'subject',modulo:'subject',clase:'subject',subject:'subject',tema:'subject'};
    const profMap   = {profesor:'teacher',docente:'teacher',teacher:'teacher'};

    function findKey(obj, mapObj) {
      const keys = Object.keys(obj).map(k=>k.toLowerCase().trim());
      for (const [k,v] of Object.entries(mapObj)) {
        const idx = keys.findIndex(kk=>kk.includes(k));
        if (idx>=0) return Object.keys(obj)[idx];
      }
      return null;
    }

    const first = rows[0];
    const dayKey  = findKey(first,dayMap);
    const sKey    = findKey(first,startMap);
    const eKey    = findKey(first,endMap);
    const subKey  = findKey(first,subjMap);
    const profKey = findKey(first,profMap);

    if (!dayKey||!subKey) {
      prev.innerHTML='<p style="color:var(--danger)">❌ No se encontraron las columnas requeridas (Día, Materia). Revisa el formato.</p>'; return;
    }

    const dayOrder = {lunes:1,martes:2,'miércoles':3,miercoles:3,jueves:4,viernes:5,'sábado':6,sabado:6,domingo:7};
    const parsed = rows.filter(r=>r[subKey]).map(r=>({
      day:        String(r[dayKey]||'').trim(),
      dayOrder:   dayOrder[(String(r[dayKey]||'').toLowerCase().trim())]||9,
      timeStart:  String(r[sKey]||'').trim(),
      timeEnd:    String(r[eKey]||'').trim(),
      subject:    String(r[subKey]||'').trim(),
      teacher:    profKey ? String(r[profKey]||'').trim() : '',
    }));

    prev.innerHTML = `
      <div style="background:#eafaf1;padding:12px 14px;border-radius:8px;margin-bottom:10px;font-size:13px">
        ✅ <strong>${parsed.length} entradas</strong> listas para importar
      </div>
      <div class="table-wrap" style="max-height:200px;overflow-y:auto;border:1px solid var(--border);border-radius:8px">
        <table><thead><tr><th>Día</th><th>Inicio</th><th>Fin</th><th>Materia</th><th>Profesor</th></tr></thead>
        <tbody>${parsed.slice(0,20).map(e=>`<tr>
          <td>${escHtml(e.day)}</td><td>${escHtml(e.timeStart)}</td><td>${escHtml(e.timeEnd)}</td>
          <td>${escHtml(e.subject)}</td><td>${escHtml(e.teacher)}</td>
        </tr>`).join('')}${parsed.length>20?`<tr><td colspan="5" class="text-center" style="color:var(--text-light);font-size:12px">... y ${parsed.length-20} más</td></tr>`:''}</tbody></table>
      </div>
      <div style="margin-top:12px">
        <button class="btn btn-primary" onclick="importarHorario(window._schedParsed)">✅ Importar Horario</button>
        <button class="btn btn-secondary" style="margin-left:8px" onclick="document.getElementById('schedPreview').innerHTML=''">✖ Cancelar</button>
      </div>`;
    window._schedParsed = parsed;
  } catch(e) {
    document.getElementById('schedPreview').innerHTML=`<p style="color:var(--danger)">❌ Error al leer el archivo: ${escHtml(e.message)}</p>`;
  }
}

async function importarHorario(entries) {
  if (!entries||!entries.length) return;
  const btn = document.querySelector('button[onclick*="importarHorario"]');
  if (btn) { btn.disabled=true; btn.textContent='⏳ Importando...'; }

  try {
    // Borrar horario existente
    const existing = await db.collection('scheduleEntries').get();
    const batch1 = db.batch();
    existing.docs.forEach(d=>batch1.delete(d.ref));
    await batch1.commit();

    // Insertar nuevo horario por lotes de 500
    for (let i=0; i<entries.length; i+=400) {
      const batch2 = db.batch();
      entries.slice(i,i+400).forEach(e => {
        const ref = db.collection('scheduleEntries').doc();
        batch2.set(ref,{...e, createdAt:firebase.firestore.FieldValue.serverTimestamp(), createdBy:currentUser.uid});
      });
      await batch2.commit();
    }
    toast(`✅ Horario importado: ${entries.length} entradas.`,'success');
    navigate('schedule');
  } catch(e) {
    toast('❌ Error al importar: '+e.message,'error');
    if (btn) { btn.disabled=false; btn.textContent='✅ Importar Horario'; }
  }
}

async function borrarHorario() {
  if (!confirm('¿Eliminar todo el horario actual?')) return;
  try {
    const snap = await db.collection('scheduleEntries').get();
    const batch = db.batch();
    snap.docs.forEach(d=>batch.delete(d.ref));
    await batch.commit();
    toast('🗑️ Horario borrado.','success');
    navigate('schedule');
  } catch(e) { toast('❌ Error: '+e.message,'error'); }
}

function parseBulkLine(line) {
  const parts = line.trim().split(/\t|;|  +/);
  if (parts.length < 2) return null;
  let nombre='',rut='';
  for (let i=0;i<parts.length;i++) {
    const p = parts[i].trim();
    if (/^\d{6,8}-?[\dkK]$/.test(p.replace(/\./g,''))) {
      rut = p.replace(/\./g,'');
      nombre = parts.filter((_,j)=>j!==i).join(' ').trim();
      break;
    }
  }
  if (!nombre||!rut) { nombre=parts[0].trim(); rut=parts[1].trim().replace(/\./g,''); }
  if (!rut.includes('-')&&rut.length>1) rut=rut.slice(0,-1)+'-'+rut.slice(-1);
  return {nombre,rut};
}

let _bulkAlumnos = [];

function previewBulk() {
  const text = document.getElementById('bulkTable').value.trim();
  if (!text) return toast('⚠️ Pega los datos primero.','warning');
  const lines = text.split('\n').filter(l=>l.trim());
  _bulkAlumnos=[]; const errors=[];
  lines.forEach((line,i) => {
    const p = parseBulkLine(line);
    if (!p) { errors.push(`Línea ${i+1}: no interpretada`); return; }
    if (!validarRut(p.rut)) { errors.push(`Línea ${i+1}: RUT inválido (${p.rut})`); return; }
    _bulkAlumnos.push(p);
  });
  const preview = document.getElementById('bulkPreview');
  const btn     = document.getElementById('btnBulkCreate');
  if (!_bulkAlumnos.length) {
    preview.innerHTML=`<div style="background:#fdecea;padding:12px;border-radius:8px;font-size:13px;color:#9b2335">❌ Sin datos válidos.<br>${errors.map(e=>`• ${escHtml(e)}`).join('<br>')}</div>`;
    btn.disabled=true; return;
  }
  btn.disabled=false;
  preview.innerHTML=`
    <div style="background:#eafaf1;padding:14px;border-radius:8px;margin-bottom:8px">
      <strong style="color:var(--success)">✅ ${_bulkAlumnos.length} alumno${_bulkAlumnos.length!==1?'s':''} listos</strong>
      ${errors.length?`<br><span style="color:var(--warning);font-size:12px">⚠️ ${errors.length} línea${errors.length!==1?'s':''} ignorada${errors.length!==1?'s':''}</span>`:''}
    </div>
    <div class="table-wrap" style="max-height:200px;overflow-y:auto;border:1px solid var(--border);border-radius:8px">
      <table><thead><tr><th>#</th><th>Nombre</th><th>RUT</th><th>Contraseña</th></tr></thead>
      <tbody>${_bulkAlumnos.map((a,i)=>`<tr>
        <td style="color:var(--text-light)">${i+1}</td>
        <td>${escHtml(a.nombre)}</td>
        <td><span style="font-family:'DM Mono'">${escHtml(a.rut)}</span></td>
        <td><span class="badge badge-orange" style="font-family:'DM Mono'">${escHtml(rutToPassword(a.rut))}</span></td>
      </tr>`).join('')}</tbody></table>
    </div>`;
}

async function crearAlumnosMasivo() {
  if (!_bulkAlumnos.length) return toast('⚠️ Previsualiza primero.','warning');
  const btn  = document.getElementById('btnBulkCreate');
  const prog = document.getElementById('bulkProgress');
  const bar  = document.getElementById('bulkBar');
  const stat = document.getElementById('bulkStatus');
  btn.disabled=true; prog.style.display='block';
  let ok=0,skip=0,err=0;
  for (let i=0;i<_bulkAlumnos.length;i++) {
    const a = _bulkAlumnos[i];
    const pct = Math.round(((i+1)/_bulkAlumnos.length)*100);
    bar.style.width=pct+'%';
    stat.textContent=`Procesando ${i+1}/${_bulkAlumnos.length}: ${a.nombre}`;
    try {
      const existing = await db.collection('users').where('rut','==',a.rut).limit(1).get();
      if (!existing.empty) { skip++; continue; }
      const email = rutToEmail(a.rut);
      const pass  = rutToPassword(a.rut);
      const cred  = await secondaryAuth.createUserWithEmailAndPassword(email, pass);
      await cred.user.updateProfile({displayName:a.nombre});
      await db.collection('users').doc(cred.user.uid).set({
        uid:cred.user.uid, email, name:a.nombre, rut:a.rut,
        role:'student', createdAt:firebase.firestore.FieldValue.serverTimestamp()
      });
      await secondaryAuth.signOut();
      ok++;
    } catch(e) { err++; }
  }
  prog.style.display='none'; btn.disabled=false;
  toast(`✅ Creados: ${ok} | Omitidos (ya existen): ${skip} | Errores: ${err}`,'success',7000);
  document.getElementById('bulkTable').value='';
  document.getElementById('bulkPreview').innerHTML='';
  _bulkAlumnos=[];
  cargarListaAlumnos();
}

async function crearAlumno() {
  const nombre = document.getElementById('aa_nombre').value.trim();
  const rut    = document.getElementById('aa_rut').value.trim();
  if (!nombre) return toast('⚠️ Ingresa el nombre.','warning');
  if (!validarRut(rut)) return toast('⚠️ RUT inválido.','warning');
  const email = rutToEmail(rut);
  const pass  = rutToPassword(rut);
  try {
    const ex = await db.collection('users').where('rut','==',rut).limit(1).get();
    if (!ex.empty) return toast('⚠️ Este RUT ya está registrado.','warning');
    const cred = await secondaryAuth.createUserWithEmailAndPassword(email, pass);
    await cred.user.updateProfile({displayName:nombre});
    await db.collection('users').doc(cred.user.uid).set({
      uid:cred.user.uid, email, name:nombre, rut,
      role:'student', createdAt:firebase.firestore.FieldValue.serverTimestamp()
    });
    await secondaryAuth.signOut();
    closeModal();
    toast(`✅ Alumno ${nombre} creado. Contraseña: ${pass}`,'success',7000);
    cargarListaAlumnos();
  } catch(e) {
    if (e.code==='auth/email-already-in-use') toast('⚠️ Este RUT ya tiene cuenta.','warning');
    else toast('❌ Error: '+e.message,'error');
  }
}

async function eliminarAlumno(uid, nombre) {
  if (!confirm(`¿Eliminar al alumno "${nombre}"? Se elimina de Firestore (no de Authentication).`)) return;
  try {
    await db.collection('users').doc(uid).delete();
    toast(`🗑️ ${nombre} eliminado.`,'success');
    cargarListaAlumnos();
  } catch(e) { toast('❌ Error: '+e.message,'error'); }
}

/* ════════════════════════════════════════════════
   MODAL JITSI — SALA PANTALLA COMPLETA
════════════════════════════════════════════════ */
let _jitsiTimer       = null;
let _jitsiStart       = null;
let _jitsiClassId     = null;
let _jitsiSessionDocId = null;

async function iniciarSalaProfesor(classId, titulo, jitsiRoom, videoType, videoUrl) {
  // Activar clase en Firestore si no está activa
  try {
    const docRef = db.collection('liveClasses').doc(classId);
    const snap = await docRef.get();
    if (snap.exists && snap.data().status !== 'active') {
      await docRef.update({ status: 'active', updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
      toast('🔴 Clase activada — EN VIVO ahora', 'success');
    }
  } catch(e) { toast('⚠️ No se pudo activar: '+e.message, 'warning'); }

  // Si es Jitsi, abrir modal; si es otra plataforma, navegar a teacher-room
  if (videoType === 'jitsi' && jitsiRoom) {
    abrirJitsiModal(classId, titulo, jitsiRoom);
  } else {
    navigate('teacher-room', { id: classId });
  }
}

async function abrirJitsiModal(classId, titulo, jitsiRoom) {
  if (!jitsiRoom) { toast('⚠️ Esta clase no tiene sala Jitsi configurada.', 'warning'); return; }

  _jitsiClassId = classId;
  _jitsiStart   = new Date();

  // Registrar sesión del profesor
  if (currentRole === 'teacher') {
    try {
      const sesDoc = await db.collection('teacherSessions').add({
        teacherUid:  currentUser.uid,
        teacherName: currentUser.displayName || currentUser.email,
        classId,
        classTitle:  titulo,
        entradaAt:   firebase.firestore.FieldValue.serverTimestamp(),
        salidaAt:    null,
        duracionSeg: 0,
        createdAt:   firebase.firestore.FieldValue.serverTimestamp(),
      });
      _jitsiSessionDocId = sesDoc.id;
    } catch(e) { /* no crítico */ }
  }

  // Ocultar botón Finalizar si es alumno (solo profe y admin pueden finalizar)
  const finBtn = document.getElementById('jitsiFinalizarBtn');
  if (finBtn) finBtn.style.display = (currentRole==='admin'||currentRole==='teacher') ? 'inline-flex' : 'none';

  // Configurar modal
  const urlJitsi = `https://meet.jit.si/${encodeURIComponent(jitsiRoom)}#userInfo.displayName="${encodeURIComponent(currentUser.displayName||currentUser.email)}"&config.startWithAudioMuted=false&config.startWithVideoMuted=false&config.prejoinPageEnabled=false`;
  document.getElementById('jitsiIframe').src = urlJitsi;
  document.getElementById('jitsiModalTitle').textContent = titulo;
  document.getElementById('jitsiModalTimer').textContent = '00:00:00';
  document.getElementById('jitsiModal').classList.add('active');
  document.body.style.overflow = 'hidden';

  // Iniciar timer
  if (_jitsiTimer) clearInterval(_jitsiTimer);
  _jitsiTimer = setInterval(() => {
    const secs = Math.floor((new Date() - _jitsiStart) / 1000);
    const h = String(Math.floor(secs/3600)).padStart(2,'0');
    const m = String(Math.floor((secs%3600)/60)).padStart(2,'0');
    const s = String(secs%60).padStart(2,'0');
    const el = document.getElementById('jitsiModalTimer');
    if (el) el.textContent = `${h}:${m}:${s}`;
  }, 1000);
}

function minimizarJitsi() {
  document.getElementById('jitsiModal').classList.remove('active');
  document.body.style.overflow = '';
  toast('📡 Sala minimizada — la clase sigue activa.', 'info');
}

async function cerrarJitsiModal() {
  if (_jitsiTimer) { clearInterval(_jitsiTimer); _jitsiTimer = null; }
  document.getElementById('jitsiIframe').src = '';
  document.getElementById('jitsiModal').classList.remove('active');
  document.body.style.overflow = '';

  // Guardar sesión del profesor
  if (_jitsiSessionDocId && _jitsiStart) {
    try {
      const durSeg = Math.floor((new Date() - _jitsiStart) / 1000);
      await db.collection('teacherSessions').doc(_jitsiSessionDocId).update({
        salidaAt: firebase.firestore.FieldValue.serverTimestamp(),
        duracionSeg: durSeg,
      });
    } catch(e) {}
    _jitsiSessionDocId = null;
  }
  _jitsiStart   = null;
  _jitsiClassId = null;
}

async function finalizarClaseDesdeModal() {
  if (!_jitsiClassId) return;
  if (!confirm('¿Finalizar la clase? Esto la cerrará para todos los alumnos.')) return;
  try {
    await db.collection('liveClasses').doc(_jitsiClassId).update({
      status: 'finished',
      updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
    });
    toast('✅ Clase finalizada correctamente.', 'success');
  } catch(e) { toast('❌ Error al finalizar: '+e.message, 'error'); }
  await cerrarJitsiModal();
  navigate('live-classes');
}
