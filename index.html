async function previewReport() {
  const type    = document.getElementById('rpt_type').value;
  const classId = document.getElementById('rpt_class').value;
  const from    = document.getElementById('rpt_date_from').value;
  const to      = document.getElementById('rpt_date_to').value;

  const previewDiv = document.getElementById('reportPreview');
  const previewCont = document.getElementById('reportPreviewContent');
  previewCont.innerHTML='<div class="empty-state"><div class="icon">⏳</div><p>Cargando...</p></div>';
  previewDiv.style.display='block';

  try {
    // Obtener alumnos
    const alumnosSnap = await db.collection('users').where('role','==','student').get();
    const alumnos = alumnosSnap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(a.name||'').localeCompare(b.name||'','es'));

    // Obtener clases
    let clsQuery = db.collection('liveClasses');
    if (classId) clsQuery = db.collection('liveClasses').where(firebase.firestore.FieldPath.documentId(),'==',classId);
    const clsSnap  = await (classId ? db.collection('liveClasses').doc(classId).get() : db.collection('liveClasses').get());
    const clases   = classId ? (clsSnap.exists ? [{id:classId,...clsSnap.data()}] : []) : clsSnap.docs.map(d=>({id:d.id,...d.data()}));

    // Obtener asistencias en rango
    let attQuery = db.collection('attendance').where('date','>=',from).where('date','<=',to);
    if (classId) attQuery = attQuery.where('classId','==',classId);
    const attSnap  = await attQuery.get();
    const attDocs  = attSnap.docs.map(d=>({id:d.id,...d.data()}));

    // Obtener fechas únicas
    const allDates = [...new Set(attDocs.map(a=>a.date))].sort();

    // PERF FIX: índice O(1) para evitar .find() O(n) dentro de doble bucle alumnos×fechas
    const attIndex = {};
    attDocs.forEach(a => { attIndex[a.userId+"|"+a.date+(a.classId?"|"+a.classId:"")] = a; });

    // Tiempo total del curso por alumno (toda la colección, sin filtro de fechas)
    let courseTimeQuery = db.collection('attendance').where('present','==',true);
    if (classId) courseTimeQuery = courseTimeQuery.where('classId','==',classId);
    const courseTimeSnap = await courseTimeQuery.get();
    const minPorAlumno = {};
    courseTimeSnap.docs.forEach(d=>{
      const a=d.data();
      if (!minPorAlumno[a.userId]) minPorAlumno[a.userId]=0;
      minPorAlumno[a.userId]+=(a.minutosEnClase||0);
    });

    if (type==='clase_dia' || type==='resumen_clase') {
      // Tabla: filas = alumnos, columnas = fechas
      _reportTitle = `Asistencia${classId?' — '+clases[0]?.title:' — Todas las Clases'} (${from} al ${to})`;
      const rows = alumnos.map(al => {
        const diasPresente = allDates.map(d => {
          const att = attIndex[al.id+"|"+d+(classId?"|"+classId:"")] || attIndex[al.id+"|"+d] || null; // O(1) index
          return att?.present===true;
        });
        const total         = diasPresente.filter(Boolean).length;
        const pct           = allDates.length>0 ? Math.round((total/allDates.length)*100) : 0;
        const totalMinCurso = minPorAlumno[al.id]||0;
        return { nombre:al.name||'—', rut:al.rut||'—', dias:diasPresente, total, pct, totalMinCurso };
      });
      _reportData = { type:'tabla_diaria', title:_reportTitle, dates:allDates, rows, classTitle:clases[0]?.title||'Todas' };

      previewCont.innerHTML = rows.length===0
        ? '<div class="empty-state"><div class="icon">📭</div><p>Sin datos.</p></div>'
        : `<div class="att-table-wrap"><table class="att-table">
          <thead>
            <tr>
              <th>Alumno</th><th>RUT</th>
              ${allDates.map(d=>`<th style="white-space:nowrap">${d.slice(5)}</th>`).join('')}
              <th>Total</th><th>%</th><th style="text-align:center">Horas Curso</th>
            </tr>
          </thead>
          <tbody>${rows.map(r=>{
            const hc=Math.floor((r.totalMinCurso||0)/60);
            const mc2=(r.totalMinCurso||0)%60;
            const hStr=r.totalMinCurso?(hc>0?hc+'h '+mc2+'min':mc2+' min'):'—';
            return `<tr>
              <td><strong>${escHtml(r.nombre)}</strong></td>
              <td><span style="font-family:'DM Mono';font-size:11px">${escHtml(r.rut)}</span></td>
              ${r.dias.map(p=>`<td class="text-center"><span class="${p?'att-dot-ok':'att-dot-no'}">${p?'✓':''}</span></td>`).join('')}
              <td class="text-center"><strong>${r.total}</strong></td>
              <td class="text-center"><span class="att-pct ${pctClass(r.pct)}">${r.pct}%</span></td>
              <td class="text-center" style="font-family:'DM Mono';font-size:11px;white-space:nowrap">${hStr}</td>
            </tr>`;}).join('')}</tbody></table></div>
          <p style="font-size:12px;color:var(--text-light);margin-top:10px">✓ = Presente | — = Ausente/No registrado</p>`;

    } else {
      // Por alumno individual
      _reportTitle = `Asistencia por Alumno (${from} al ${to})`;
      const rows = alumnos.map(al => {
        const misAtts   = attDocs.filter(a=>a.userId===al.id);
        const total     = misAtts.length;
        const present   = misAtts.filter(a=>a.present).length;
        const pct       = total>0 ? Math.round((present/total)*100) : 0;
        const totalMinCurso = minPorAlumno[al.id]||0;
        return { nombre:al.name||'—', rut:al.rut||'—', total, present, pct, totalMinCurso };
      });
      _reportData = { type:'resumen_alumno', title:_reportTitle, rows };

      previewCont.innerHTML = `<div class="table-wrap"><table>

async function exportTeacherReport() {
  const from = document.getElementById('trpt_from').value;
  const to   = document.getElementById('trpt_to').value;

  try {
    toast('⏳ Generando reporte...','info',3000);
    const clsSnap = await db.collection('liveClasses').where('teacherUid','==',currentUser.uid).get();
    const myIds   = clsSnap.docs.map(d=>d.id);
    if (!myIds.length) return toast('⚠️ No tienes clases asignadas.','warning');

    const attSnap = await db.collection('attendance')
      .where('classId','in',myIds.slice(0,10))
      .where('date','>=',from).where('date','<=',to).get();
    const attDocs = attSnap.docs.map(d=>({id:d.id,...d.data()}));

    const dates = [...new Set(attDocs.map(a=>a.date))].sort();
    const alumnosIds = [...new Set(attDocs.map(a=>a.userId))];
    const alumnosSnap = await db.collection('users').where('role','==','student').get();
    const alumnos = alumnosSnap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(a.name||'').localeCompare(b.name||'','es'));

    // Tiempo total por alumno (sin filtro de fecha para acumulado del curso)
    let tQuery = db.collection('attendance').where('classId','in',myIds.slice(0,10)).where('present','==',true);
    const tSnap = await tQuery.get();
    const minPorAlumno = {};
    tSnap.docs.forEach(d=>{ const a=d.data(); minPorAlumno[a.userId]=(minPorAlumno[a.userId]||0)+(a.minutosEnClase||0); });

    // Índice O(1) para lookup por alumno+fecha
    const attIdx = {};
    attDocs.forEach(a=>{ attIdx[a.userId+"|"+a.date]=a; });

    const wb = XLSX.utils.book_new();
    const header = ['Alumno','RUT',...dates,'Días Presentes','% Asistencia','Min. Totales Curso','Horas Curso'];
    const rows = alumnos.map(al => {
      const dias = dates.map(d => {
        const att = attIdx[al.id+"|"+d];
        return att?.present ? 'Presente' : 'Ausente';
      });
      const total  = dias.filter(d=>d==='Presente').length;
      const pct    = dates.length>0 ? Math.round((total/dates.length)*100) : 0;
      const totMin = minPorAlumno[al.id]||0;
      const hStr   = totMin?(Math.floor(totMin/60)+'h '+(totMin%60)+'min'):'—';
      return [al.name||'—',al.rut||'—',...dias,total,pct+'%',totMin,hStr];
    });
    const ws = XLSX.utils.aoa_to_sheet([header,...rows]);
    ws['!cols'] = [{wch:30},{wch:14},...dates.map(()=>({wch:12})),{wch:14},{wch:10},{wch:16},{wch:12}];
    XLSX.utils.book_append_sheet(wb, ws, 'Asistencia');

    const filename = `Asistencia_MisClases_${todayStr()}.xlsx`;
    XLSX.writeFile(wb, filename);
    toast('📥 Reporte exportado.','success');
  } catch(e) {
    toast('❌ Error: '+e.message,'error');
  }
}

async function readScheduleFile(input) {
  const file = input.files[0];
  if (!file) return;
  const prev = document.getElementById('schedPreview');
  prev.innerHTML='<p style="font-size:13px;color:var(--text-mid)">⏳ Leyendo archivo...</p>';

  try {
    const data = await file.arrayBuffer();
    const wb   = XLSX.read(data, {type:'array'});
    const ws   = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, {defval:''});

    if (!rows.length) { prev.innerHTML='<p style="color:var(--danger)">❌ El archivo está vacío.</p>'; return; }

    // Mapear columnas flexiblemente
    const dayMap    = {dia:'day',día:'day',day:'day'};
    const startMap  = {'hora inicio':'timeStart','hora_inicio':'timeStart','start':'timeStart','inicio':'timeStart','hora inicio':'timeStart'};
    const endMap    = {'hora fin':'timeEnd','hora_fin':'timeEnd','end':'timeEnd','fin':'timeEnd','término':'timeEnd','termino':'timeEnd'};
    const subjMap   = {materia:'subject',asignatura:'subject',módulo:'subject',modulo:'subject',clase:'subject',subject:'subject',tema:'subject'};
    const profMap   = {profesor:'teacher',docente:'teacher',teacher:'teacher'};

    function findKey(obj, mapObj) {
      const keys = Object.keys(obj).map(k=>k.toLowerCase().trim());
      for (const [k,v] of Object.entries(mapObj)) {
        const idx = keys.findIndex(kk=>kk.includes(k));
        if (idx>=0) return Object.keys(obj)[idx];
      }
      return null;
    }

    const first = rows[0];
    const dayKey  = findKey(first,dayMap);
    const sKey    = findKey(first,startMap);
    const eKey    = findKey(first,endMap);
    const subKey  = findKey(first,subjMap);
    const profKey = findKey(first,profMap);

    if (!dayKey||!subKey) {
      prev.innerHTML='<p style="color:var(--danger)">❌ No se encontraron las columnas requeridas (Día, Materia). Revisa el formato.</p>'; return;
    }

    const dayOrder = {lunes:1,martes:2,'miércoles':3,miercoles:3,jueves:4,viernes:5,'sábado':6,sabado:6,domingo:7};
    const parsed = rows.filter(r=>r[subKey]).map(r=>({
      day:        String(r[dayKey]||'').trim(),
      dayOrder:   dayOrder[(String(r[dayKey]||'').toLowerCase().trim())]||9,
      timeStart:  String(r[sKey]||'').trim(),
      timeEnd:    String(r[eKey]||'').trim(),
      subject:    String(r[subKey]||'').trim(),
      teacher:    profKey ? String(r[profKey]||'').trim() : '',
    }));

    prev.innerHTML = `
      <div style="background:#eafaf1;padding:12px 14px;border-radius:8px;margin-bottom:10px;font-size:13px">
        ✅ <strong>${parsed.length} entradas</strong> listas para importar
      </div>
      <div class="table-wrap" style="max-height:200px;overflow-y:auto;border:1px solid var(--border);border-radius:8px">
        <table><thead><tr><th>Día</th><th>Inicio</th><th>Fin</th><th>Materia</th><th>Profesor</th></tr></thead>
        <tbody>${parsed.slice(0,20).map(e=>`<tr>
          <td>${escHtml(e.day)}</td><td>${escHtml(e.timeStart)}</td><td>${escHtml(e.timeEnd)}</td>
          <td>${escHtml(e.subject)}</td><td>${escHtml(e.teacher)}</td>
        </tr>`).join('')}${parsed.length>20?`<tr><td colspan="5" class="text-center" style="color:var(--text-light);font-size:12px">... y ${parsed.length-20} más</td></tr>`:''}</tbody></table>
      </div>
      <div style="margin-top:12px">
        <button class="btn btn-primary" onclick="importarHorario(window._schedParsed)">✅ Importar Horario</button>
        <button class="btn btn-secondary" style="margin-left:8px" onclick="document.getElementById('schedPreview').innerHTML=''">✖ Cancelar</button>
      </div>`;
    window._schedParsed = parsed;
  } catch(e) {
    document.getElementById('schedPreview').innerHTML=`<p style="color:var(--danger)">❌ Error al leer el archivo: ${escHtml(e.message)}</p>`;
  }
}

async function importarHorario(entries) {
  if (!entries||!entries.length) return;
  const btn = document.querySelector('button[onclick*="importarHorario"]');
  if (btn) { btn.disabled=true; btn.textContent='⏳ Importando...'; }

  try {
    // Borrar horario existente
    const existing = await db.collection('scheduleEntries').get();
    const batch1 = db.batch();
    existing.docs.forEach(d=>batch1.delete(d.ref));
    await batch1.commit();

    // Insertar nuevo horario por lotes de 500
    for (let i=0; i<entries.length; i+=400) {
      const batch2 = db.batch();
      entries.slice(i,i+400).forEach(e => {
        const ref = db.collection('scheduleEntries').doc();
        batch2.set(ref,{...e, createdAt:firebase.firestore.FieldValue.serverTimestamp(), createdBy:currentUser.uid});
      });
      await batch2.commit();
    }
    toast(`✅ Horario importado: ${entries.length} entradas.`,'success');
    navigate('schedule');
  } catch(e) {
    toast('❌ Error al importar: '+e.message,'error');
    if (btn) { btn.disabled=false; btn.textContent='✅ Importar Horario'; }
  }
}

async function borrarHorario() {
  if (!confirm('¿Eliminar todo el horario actual?')) return;
  try {
    const snap = await db.collection('scheduleEntries').get();
    const batch = db.batch();
    snap.docs.forEach(d=>batch.delete(d.ref));
    await batch.commit();
    toast('🗑️ Horario borrado.','success');
    navigate('schedule');
  } catch(e) { toast('❌ Error: '+e.message,'error'); }
}

function parseBulkLine(line) {
  const parts = line.trim().split(/\t|;|  +/);
  if (parts.length < 2) return null;
  let nombre='',rut='';
  for (let i=0;i<parts.length;i++) {
    const p = parts[i].trim();
    if (/^\d{6,8}-?[\dkK]$/.test(p.replace(/\./g,''))) {
      rut = p.replace(/\./g,'');
      nombre = parts.filter((_,j)=>j!==i).join(' ').trim();
      break;
    }
  }
  if (!nombre||!rut) { nombre=parts[0].trim(); rut=parts[1].trim().replace(/\./g,''); }
  if (!rut.includes('-')&&rut.length>1) rut=rut.slice(0,-1)+'-'+rut.slice(-1);
  return {nombre,rut};
}

let _bulkAlumnos = [];

function previewBulk() {
  const text = document.getElementById('bulkTable').value.trim();
  if (!text) return toast('⚠️ Pega los datos primero.','warning');
  const lines = text.split('\n').filter(l=>l.trim());
  _bulkAlumnos=[]; const errors=[];
  lines.forEach((line,i) => {
    const p = parseBulkLine(line);
    if (!p) { errors.push(`Línea ${i+1}: no interpretada`); return; }
    if (!validarRut(p.rut)) { errors.push(`Línea ${i+1}: RUT inválido (${p.rut})`); return; }
    _bulkAlumnos.push(p);
  });
  const preview = document.getElementById('bulkPreview');
  const btn     = document.getElementById('btnBulkCreate');
  if (!_bulkAlumnos.length) {
    preview.innerHTML=`<div style="background:#fdecea;padding:12px;border-radius:8px;font-size:13px;color:#9b2335">❌ Sin datos válidos.<br>${errors.map(e=>`• ${escHtml(e)}`).join('<br>')}</div>`;
    btn.disabled=true; return;
  }
  btn.disabled=false;
  preview.innerHTML=`
    <div style="background:#eafaf1;padding:14px;border-radius:8px;margin-bottom:8px">
      <strong style="color:var(--success)">✅ ${_bulkAlumnos.length} alumno${_bulkAlumnos.length!==1?'s':''} listos</strong>
      ${errors.length?`<br><span style="color:var(--warning);font-size:12px">⚠️ ${errors.length} línea${errors.length!==1?'s':''} ignorada${errors.length!==1?'s':''}</span>`:''}
    </div>
    <div class="table-wrap" style="max-height:200px;overflow-y:auto;border:1px solid var(--border);border-radius:8px">
      <table><thead><tr><th>#</th><th>Nombre</th><th>RUT</th><th>Contraseña</th></tr></thead>
      <tbody>${_bulkAlumnos.map((a,i)=>`<tr>
        <td style="color:var(--text-light)">${i+1}</td>
        <td>${escHtml(a.nombre)}</td>
        <td><span style="font-family:'DM Mono'">${escHtml(a.rut)}</span></td>
        <td><span class="badge badge-orange" style="font-family:'DM Mono'">${escHtml(rutToPassword(a.rut))}</span></td>
      </tr>`).join('')}</tbody></table>
    </div>`;
}

async function crearAlumnosMasivo() {
  if (!_bulkAlumnos.length) return toast('⚠️ Previsualiza primero.','warning');
  const btn  = document.getElementById('btnBulkCreate');
  const prog = document.getElementById('bulkProgress');
  const bar  = document.getElementById('bulkBar');
  const stat = document.getElementById('bulkStatus');
  btn.disabled=true; prog.style.display='block';
  let ok=0,skip=0,err=0;
  for (let i=0;i<_bulkAlumnos.length;i++) {
    const a = _bulkAlumnos[i];
    const pct = Math.round(((i+1)/_bulkAlumnos.length)*100);
    bar.style.width=pct+'%';
    stat.textContent=`Procesando ${i+1}/${_bulkAlumnos.length}: ${a.nombre}`;
    try {
      const existing = await db.collection('users').where('rut','==',a.rut).limit(1).get();
      if (!existing.empty) { skip++; continue; }
      const email = rutToEmail(a.rut);
      const pass  = rutToPassword(a.rut);
      const cred  = await secondaryAuth.createUserWithEmailAndPassword(email, pass);
      await cred.user.updateProfile({displayName:a.nombre});
      await db.collection('users').doc(cred.user.uid).set({
        uid:cred.user.uid, email, name:a.nombre, rut:a.rut,
        role:'student', createdAt:firebase.firestore.FieldValue.serverTimestamp()
      });
      await secondaryAuth.signOut();
      ok++;
    } catch(e) { err++; }
  }
  prog.style.display='none'; btn.disabled=false;
  toast(`✅ Creados: ${ok} | Omitidos (ya existen): ${skip} | Errores: ${err}`,'success',7000);
  document.getElementById('bulkTable').value='';
  document.getElementById('bulkPreview').innerHTML='';
  _bulkAlumnos=[];
  cargarListaAlumnos();
}

async function guardarConfigWorkspace() {
  const meetUrl     = document.getElementById('cfg_meetUrl')?.value.trim() || '';
  const email       = document.getElementById('cfg_email')?.value.trim() || '';
  const scheduleUrl = document.getElementById('cfg_scheduleUrl')?.value.trim() || '';

  if (!meetUrl) return toast('⚠️ Ingresa la URL de la sala Meet.','warning');
  if (!meetUrl.startsWith('https://meet.google.com/')) return toast('⚠️ La URL debe empezar con https://meet.google.com/','warning');

  try {
    await db.collection('config').doc('googleWorkspace').set({
      meetUrl, meetMode: 'fixed', email, scheduleUrl,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
      updatedBy: currentUser.uid,
    }, {merge:true});
    toast('✅ Configuración guardada correctamente.','success', 5000);
    navigate('config');
  } catch(e) {
    toast('❌ Error al guardar: '+e.message,'error');
  }
}

async function guardarCredencialesMeet() {
  const accEmail    = document.getElementById('cfg_meetAccEmail')?.value.trim() || '';
  const accPass     = document.getElementById('cfg_meetAccPass')?.value || '';
  const whoCanStart = document.getElementById('cfg_whoCanStart')?.value || 'both';

  if (!accEmail && !accPass && whoCanStart === (await db.collection('config').doc('googleWorkspace').get().then(d=>d.data()?.whoCanStart||'both'))) {
    return toast('⚠️ No hay cambios para guardar.','warning');
  }

  try {
    const updates = {
      whoCanStart,
      credUpdatedAt: firebase.firestore.FieldValue.serverTimestamp(),
      credUpdatedBy: currentUser.uid,
    };
    // Ofuscar con base64 (no encriptación fuerte, pero evita texto plano visible en consola)
    if (accEmail) updates.meetAccountEmail = btoa(accEmail);
    if (accPass)  updates.meetAccountPassStored = btoa(accPass);  // base64 simple

    await db.collection('config').doc('googleWorkspace').set(updates, {merge:true});
    toast('✅ Credenciales y permisos guardados.','success', 5000);
    navigate('config');
  } catch(e) {
    toast('❌ Error al guardar credenciales: '+e.message,'error');
  }
}

async function cargarFiscClases() {
  const cont   = document.getElementById('fiscClasesContainer');

async function cargarFiscAsistencia() {
  const cont    = document.getElementById('fiscAttContainer');
  const date    = document.getElementById('fisc_att_date')?.value||todayStr();
  const classId = document.getElementById('fisc_att_class')?.value||'';
  if (!cont) return;
  cont.innerHTML='<div class="empty-state"><div class="icon">⏳</div><p>Cargando...</p></div>';

  try {
    // Todos los alumnos
    const alumnosSnap = await db.collection('users').where('role','==','student').get();
    const alumnos = alumnosSnap.docs.map(d=>({id:d.id,...d.data()}))
      .sort((a,b)=>(a.name||'').localeCompare(b.name||'','es'));

    // Asistencias del día
    let attQuery = db.collection('attendance').where('date','==',date);
    if (classId) attQuery = attQuery.where('classId','==',classId);
    const attSnap = await attQuery.get();
    const attDocs = attSnap.docs.map(d=>({id:d.id,...d.data()}));

    const presentes  = attDocs.filter(a=>a.present).length;
    const ausentes   = alumnos.length - presentes;
    const now        = Date.now();

    // Obtener lastSeen para online indicator
    const usersSnap2 = await db.collection('users').get();
    const usersMap   = {};
    usersSnap2.docs.forEach(d=>{ usersMap[d.id]=d.data(); });

    const dateFormatted = new Date(date+'T12:00:00').toLocaleDateString('es-CL',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

    cont.innerHTML = `
      <div class="stats-grid" style="grid-template-columns:repeat(auto-fill,minmax(150px,1fr));margin-bottom:16px">
        <div class="stat-card"><div class="stat-icon">🎓</div><div class="stat-value">${alumnos.length}</div><div class="stat-label">Total Alumnos</div></div>
        <div class="stat-card"><div class="stat-icon">✅</div><div class="stat-value" style="color:var(--success)">${presentes}</div><div class="stat-label">Presentes</div></div>
        <div class="stat-card"><div class="stat-icon">❌</div><div class="stat-value" style="color:var(--danger)">${ausentes}</div><div class="stat-label">Ausentes</div></div>
        <div class="stat-card"><div class="stat-icon">📊</div><div class="stat-value" style="color:${alumnos.length>0?pctClass(Math.round(presentes/alumnos.length*100))==='good'?'var(--success)':pctClass(Math.round(presentes/alumnos.length*100))==='warning'?'var(--warning)':'var(--danger)':'var(--text-light)'}">${alumnos.length>0?Math.round(presentes/alumnos.length*100):0}%</div><div class="stat-label">% Asistencia</div></div>
      </div>
      <div class="card">
        <div class="card-header">
          <h3>📋 ${escHtml(dateFormatted)}</h3>
          <span class="badge badge-blue">${attDocs.length} registros</span>
        </div>
        <div class="table-wrap"><table>
          <thead><tr><th>Alumno</th><th>RUT</th><th>Estado</th><th>Clase</th><th>Hora Registro</th><th>Online</th></tr></thead>
          <tbody>${alumnos.map(al=>{
            const att = attDocs.find(a=>a.userId===al.id);
            const present = att?.present===true;
            const userData = usersMap[al.id]||{};
            const lastSeen = userData.lastSeen?.toDate?.();
            const online   = lastSeen && (now-lastSeen.getTime())<90000 && userData.lastClassId && (classId?userData.lastClassId===classId:true);
            return `<tr>
              <td><div style="display:flex;align-items:center;gap:8px">
                <div style="width:28px;height:28px;border-radius:50%;background:${present?'var(--success)':'#ccc'};color:#fff;font-weight:700;font-size:11px;display:inline-flex;align-items:center;justify-content:center">${(al.name||'?').slice(0,2).toUpperCase()}</div>
                <strong>${escHtml(al.name||'—')}</strong>
              </div></td>
              <td><span style="font-family:'DM Mono';font-size:12px">${escHtml(al.rut||'—')}</span></td>
              <td><span class="badge ${present?'badge-green':'badge-gray'}">${present?'✅ Presente':'— Ausente'}</span></td>
              <td style="font-size:12px">${escHtml(att?.classTitle||'—')}</td>
              <td style="font-size:12px">${att?.checkedAt?fmtDateTime(att.checkedAt):'—'}</td>
              <td><span class="${online?'online-dot':'offline-dot'}"></span>${online?'<span style="color:var(--success);font-size:12px;font-weight:600">Online</span>':'<span style="color:#aaa;font-size:12px">—</span>'}</td>
            </tr>`;}).join('')}
          </tbody></table></div>
      </div>`;
  } catch(e) { cont.innerHTML=`<div class="empty-state"><div class="icon">❌</div><p>${escHtml(e.message)}</p></div>`; }
}

let _fiscReportData = null;

async function previewFiscReporte() {
  const from    = document.getElementById('fiscr_from')?.value || document.getElementById('fisc_att_date')?.value || todayStr();
  const to      = document.getElementById('fiscr_to')?.value   || todayStr();
  const classId = document.getElementById('fiscr_class')?.value||'';

  const previewDiv  = document.getElementById('fiscRptPreview');
  const previewCont = document.getElementById('fiscRptContent');
  if (previewDiv)  previewDiv.style.display='block';
  if (previewCont) previewCont.innerHTML='<div class="empty-state"><div class="icon">⏳</div><p>Cargando...</p></div>';

  try {
    const alumnosSnap = await db.collection('users').where('role','==','student').get();
    const alumnos = alumnosSnap.docs.map(d=>({id:d.id,...d.data()}))
      .sort((a,b)=>(a.name||'').localeCompare(b.name||'','es'));

    let attQuery = db.collection('attendance').where('date','>=',from).where('date','<=',to);
    if (classId) attQuery = attQuery.where('classId','==',classId);
    const attSnap = await attQuery.get();
    const attDocs = attSnap.docs.map(d=>({id:d.id,...d.data()}));

    const allDates = [...new Set(attDocs.map(a=>a.date))].sort();

    // Índice local O(1) para lookup de asistencias en fiscReporte
    const attIndexFisc = {};
    attDocs.forEach(a => { attIndexFisc[a.userId+"|"+a.date+(a.classId?"|"+a.classId:"")] = a; });

    // Tiempo total del curso por alumno (toda la colección, sin filtro de fechas)
    let courseTimeQ = db.collection('attendance').where('present','==',true);
    if (classId) courseTimeQ = courseTimeQ.where('classId','==',classId);
    const courseTimeS = await courseTimeQ.get();
    const minPorAlumnoFisc = {};
    courseTimeS.docs.forEach(d=>{
      const a=d.data();
      minPorAlumnoFisc[a.userId]=(minPorAlumnoFisc[a.userId]||0)+(a.minutosEnClase||0);
    });

    const rows = alumnos.map(al=>{
      const dias = allDates.map(d=>{
        const att = attIndexFisc[al.id+"|"+d+(classId?"|"+classId:"")] || attIndexFisc[al.id+"|"+d] || null; // O(1) local index
        return att?.present===true;
      });
      const total         = dias.filter(Boolean).length;
      const pct           = allDates.length>0 ? Math.round((total/allDates.length)*100) : 0;
      const totalMinCurso = minPorAlumnoFisc[al.id]||0;
      return {nombre:al.name||'—', rut:al.rut||'—', dias, total, pct, totalMinCurso};
    });

    _fiscReportData = {dates:allDates, rows, from, to};

    if (previewCont) previewCont.innerHTML = rows.length===0
      ? '<div class="empty-state"><div class="icon">📭</div><p>Sin datos para ese período.</p></div>'
      : `<div class="att-table-wrap"><table class="att-table">
          <thead><tr>
            <th>Alumno</th><th>RUT</th>
            ${allDates.map(d=>`<th>${d.slice(5)}</th>`).join('')}
            <th>Total</th><th>%</th><th style="text-align:center">Horas Curso</th>
          </tr></thead>
          <tbody>${rows.map(r=>{
            const hc=Math.floor((r.totalMinCurso||0)/60);
            const mc2=(r.totalMinCurso||0)%60;
            const hStr=r.totalMinCurso?(hc>0?hc+'h '+mc2+'min':mc2+' min'):'—';
            return `<tr>
              <td><strong>${escHtml(r.nombre)}</strong></td>
              <td><span style="font-family:'DM Mono';font-size:11px">${escHtml(r.rut)}</span></td>
              ${r.dias.map(p=>`<td class="text-center"><span class="${p?'att-dot-ok':'att-dot-no'}">${p?'✓':''}</span></td>`).join('')}
              <td class="text-center"><strong>${r.total}</strong></td>
              <td class="text-center"><span class="att-pct ${pctClass(r.pct)}">${r.pct}%</span></td>
              <td class="text-center" style="font-family:'DM Mono';font-size:11px;white-space:nowrap">${hStr}</td>
            </tr>`;}).join('')}</tbody></table></div>
          <p style="font-size:12px;color:var(--text-light);margin-top:8px">✓ = Presente | — = Ausente</p>`;

    const btn = document.getElementById('btnFiscExport');
    if (btn) btn.disabled=false;
    toast('✅ Reporte listo para exportar.','success');
  } catch(e) {
    if (previewCont) previewCont.innerHTML=`<div class="empty-state"><div class="icon">❌</div><p>${escHtml(e.message)}</p></div>`;
    toast('❌ Error: '+e.message,'error');
  }
}

async function exportFiscReporte() {
  // Si viene desde fisc-asistencia sin previsualizar, genera los datos primero
  if (!_fiscReportData) {
    await previewFiscReporte();
    if (!_fiscReportData) return;
  }
  const {dates, rows, from, to} = _fiscReportData;
  const wb = XLSX.utils.book_new();

  // Hoja 1: Asistencia diaria
  const hdr1 = ['Alumno','RUT',...dates,'Días Presente','% Asistencia','Min. Totales Curso','Horas Curso'];
  const data1 = rows.map(r=>{
    const hc=Math.floor((r.totalMinCurso||0)/60);
    const mc2=(r.totalMinCurso||0)%60;
    const hStr=r.totalMinCurso?(hc>0?hc+'h '+mc2+'min':mc2+' min'):'—';
    return [r.nombre,r.rut,...r.dias.map(p=>p?'Presente':'Ausente'),r.total,r.pct+'%',r.totalMinCurso||0,hStr];
  });
  const ws1 = XLSX.utils.aoa_to_sheet([hdr1,...data1]);
  ws1['!cols'] = [{wch:30},{wch:14},...dates.map(()=>({wch:12})),{wch:14},{wch:12},{wch:16},{wch:12}];
  XLSX.utils.book_append_sheet(wb, ws1, 'Asistencia Diaria');

  // Hoja 2: Resumen con tiempo total
  const hdr2 = ['Alumno','RUT','Total Días','Días Presente','% Asistencia','Min. Totales Curso','Horas Curso','Estado'];
  const data2 = rows.map(r=>{
    const hc=Math.floor((r.totalMinCurso||0)/60);
    const mc2=(r.totalMinCurso||0)%60;
    const hStr=r.totalMinCurso?(hc>0?hc+'h '+mc2+'min':mc2+' min'):'—';
    return [r.nombre, r.rut, dates.length, r.total, r.pct+'%',
      r.totalMinCurso||0, hStr, r.pct>=75?'✅ Aprobado':'⚠️ En Riesgo'];
  });
  const ws2 = XLSX.utils.aoa_to_sheet([hdr2,...data2]);
  ws2['!cols'] = [{wch:30},{wch:14},{wch:12},{wch:14},{wch:14},{wch:16},{wch:12},{wch:14}];
  XLSX.utils.book_append_sheet(wb, ws2, 'Resumen');

  // Hoja 3: Metadata de fiscalización
  const meta = [
    ['INASEP — Reporte de Fiscalización'],
    ['Generado','', new Date().toLocaleString('es-CL')],
    ['Período','', `${from} al ${to}`],
    ['Total Alumnos','', rows.length],
    ['Días con Clases','', dates.length],
  ];
  const ws3 = XLSX.utils.aoa_to_sheet(meta);
  ws3['!cols'] = [{wch:22},{wch:4},{wch:28}];
  XLSX.utils.book_append_sheet(wb, ws3, 'Fiscalización');

  XLSX.writeFile(wb, `Fiscalizacion_INASEP_${from}_${to}.xlsx`);
  toast('📥 Reporte de fiscalización exportado.','success');
}

async function confirmarArchivado() {
  const codigo  = (document.getElementById('arc_codigo')?.value||'').trim().toUpperCase();
  const nombre  = (document.getElementById('arc_nombre')?.value||'').trim();
  const inicio  = document.getElementById('arc_inicio')?.value||'';
  const termino = document.getElementById('arc_termino')?.value||todayStr();
  const obs     = (document.getElementById('arc_obs')?.value||'').trim();

  if (!codigo || codigo.length < 3) return toast('⚠️ Ingresa un código interno válido (mínimo 3 caracteres).','warning');

  // Verificar que no exista ese código ya
  try {
    const existing = await db.collection('archivedCourses').doc(codigo).get();
    if (existing.exists) return toast(`⚠️ Ya existe un archivo con el código "${codigo}". Usa un código diferente.`,'warning');
  } catch(e) {}

  const confirmMsg = `¿Estás COMPLETAMENTE SEGURO?\n\nSe archivará el curso con código: ${codigo}\n\nEsto eliminará PERMANENTEMENTE:\n• Todos los alumnos\n• Todas las clases\n• Todos los registros de asistencia\n• El horario actual\n\nLos datos quedarán guardados en archivedCourses/${codigo}\n\nEscribe el código "${codigo}" para confirmar:`;
  const input = prompt(confirmMsg);
  if (input !== codigo) return toast('❌ Código incorrecto. Operación cancelada.','error');

  await ejecutarArchivado(codigo, nombre, inicio, termino, obs);
}

async function ejecutarArchivado(codigo, nombre, inicio, termino, obs) {
  const btn = document.getElementById('btnArchivar');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Archivando...'; }

  const resDiv = document.getElementById('arc_resumen');
  if (resDiv) {
    resDiv.style.display = 'block';
    resDiv.innerHTML = `
      <div class="card" style="border-color:var(--info)">
        <div class="card-header"><h3>⏳ Procesando archivo del curso...</h3></div>
        <div id="arc_log" style="font-family:'DM Mono';font-size:12.5px;color:var(--text-mid);line-height:2;padding:4px"></div>
      </div>`;
  }

  const log = (msg) => {
    const el = document.getElementById('arc_log');
    if (el) el.innerHTML += `${msg}<br>`;
  };

  try {
    // ── 1. LEER TODOS LOS DATOS ──
    log('📦 Leyendo alumnos...');
    const alumSnap = await db.collection('users').where('role','==','student').get();
    const alumnos  = alumSnap.docs.map(d=>({_id:d.id,...d.data()}));

    log('📦 Leyendo clases...');
    const clsSnap  = await db.collection('liveClasses').get();
    const clases   = clsSnap.docs.map(d=>({_id:d.id,...d.data()}));

    log('📦 Leyendo asistencias...');
    const attSnap  = await db.collection('attendance').get();
    const asistencias = attSnap.docs.map(d=>({_id:d.id,...d.data()}));

    log('📦 Leyendo horario...');
    const schedSnap = await db.collection('scheduleEntries').get();
    const horario   = schedSnap.docs.map(d=>({_id:d.id,...d.data()}));

    log('📦 Leyendo sesiones de profesores...');
    const sesSnap  = await db.collection('teacherSessions').get();
    const sesiones = sesSnap.docs.map(d=>({_id:d.id,...d.data()}));

    // ── 2. GUARDAR EN archivedCourses/{codigo} ──
    log(`💾 Guardando archivo en archivedCourses/${codigo}...`);

    // Convertir Timestamps a strings para poder guardar sin problema
    const serializeDoc = (obj) => {
      const out = {};
      for (const [k, v] of Object.entries(obj)) {
        if (v && typeof v.toDate === 'function') out[k] = v.toDate().toISOString();
        else if (v && typeof v === 'object' && !Array.isArray(v) && v.constructor === Object) out[k] = serializeDoc(v);
        else out[k] = v;
      }
      return out;
    };

    await db.collection('archivedCourses').doc(codigo).set({
      codigo,
      nombre:      nombre || codigo,
      inicio,
      termino,
      observaciones: obs,
      archivedAt:  firebase.firestore.FieldValue.serverTimestamp(),
      archivedBy:  currentUser.uid,
      stats: {
        totalAlumnos:    alumnos.length,
        totalClases:     clases.length,
        totalAsistencias: asistencias.length,
        totalHorario:    horario.length,
      },
    });

    // Guardar sub-arrays como sub-documentos (máx 1MB por doc, guardamos en batches de 400)
    log('💾 Guardando datos de alumnos...');
    const chunkSize = 400;
    const chunks = (arr) => {
      const res = [];
      for (let i=0; i<arr.length; i+=chunkSize) res.push(arr.slice(i, i+chunkSize));
      return res;
    };

    // Alumnos
    const alumChunks = chunks(alumnos.map(serializeDoc));
    for (let i=0; i<alumChunks.length; i++) {
      await db.collection('archivedCourses').doc(codigo)
        .collection('data').doc(`alumnos_${i}`).set({ alumnos: alumChunks[i] });
    }

    // Clases
    log('💾 Guardando clases...');
    const clsChunks = chunks(clases.map(serializeDoc));
    for (let i=0; i<clsChunks.length; i++) {
      await db.collection('archivedCourses').doc(codigo)
        .collection('data').doc(`clases_${i}`).set({ clases: clsChunks[i] });
    }

    // Asistencias
    log('💾 Guardando asistencias...');
    const attChunks = chunks(asistencias.map(serializeDoc));
    for (let i=0; i<attChunks.length; i++) {
      await db.collection('archivedCourses').doc(codigo)
        .collection('data').doc(`asistencias_${i}`).set({ asistencias: attChunks[i] });
    }

    // Horario
    log('💾 Guardando horario...');
    await db.collection('archivedCourses').doc(codigo)
      .collection('data').doc('horario').set({ horario: horario.map(serializeDoc) });

    // Sesiones profesores
    log('💾 Guardando sesiones de profesores...');
    const sesChunks = chunks(sesiones.map(serializeDoc));
    for (let i=0; i<sesChunks.length; i++) {
      await db.collection('archivedCourses').doc(codigo)
        .collection('data').doc(`sesiones_${i}`).set({ sesiones: sesChunks[i] });
    }

    // ── 3. ELIMINAR EN LOTES (batch de Firestore = máx 500 ops) ──
    const deleteBatch = async (docs) => {
      const batchSize = 490;
      for (let i=0; i<docs.length; i+=batchSize) {
        const b = db.batch();
        docs.slice(i, i+batchSize).forEach(d => b.delete(d.ref));
        await b.commit();
      }
    };

    log(`🗑️ Eliminando ${attSnap.docs.length} registros de asistencia...`);
    await deleteBatch(attSnap.docs);

    log(`🗑️ Eliminando ${clsSnap.docs.length} clases...`);
    await deleteBatch(clsSnap.docs);

    log(`🗑️ Eliminando ${schedSnap.docs.length} entradas de horario...`);
    await deleteBatch(schedSnap.docs);

    log(`🗑️ Eliminando ${sesSnap.docs.length} sesiones de profesores...`);
    await deleteBatch(sesSnap.docs);

    log(`🗑️ Eliminando ${alumSnap.docs.length} alumnos de Firestore...`);
    await deleteBatch(alumSnap.docs);

    // ── 4. NOTA sobre Authentication ──
    // La eliminación de usuarios de Firebase Authentication requiere Admin SDK (backend).
    // Desde el cliente solo podemos marcarlos. Aquí dejamos nota para el admin.
    log('⚠️ Nota: la eliminación de usuarios de Firebase Authentication requiere hacerse manualmente desde la consola de Firebase o con Admin SDK.');

    // ── 5. LIMPIAR config Meet URL (opcional) ──
    // No borramos la URL de Meet, solo el horario URL ya está limpio
    // await db.collection('config').doc('googleWorkspace').update({ scheduleUrl: '' });

    log('✅ ¡Archivo completado exitosamente!');

    const logEl = document.getElementById('arc_log');
    if (logEl) logEl.innerHTML += `
      <br><div style="background:linear-gradient(135deg,#eafaf1,#f5fdf7);border:1px solid var(--green-300);border-radius:8px;padding:14px 16px;margin-top:8px;color:var(--green-900)">
        <div style="font-weight:700;font-size:14px;margin-bottom:6px">✅ Curso "${escHtml(codigo)}" archivado correctamente</div>
        <div style="font-size:12px;line-height:1.8">
          📦 Alumnos archivados: <strong>${alumnos.length}</strong><br>
          📹 Clases archivadas: <strong>${clases.length}</strong><br>
          ✅ Asistencias archivadas: <strong>${asistencias.length}</strong><br>
          🗓️ Horario archivado: <strong>${horario.length} entradas</strong><br>
          <br>
          🧹 La plataforma está lista para el nuevo curso.<br>
          ⚠️ Recuerda eliminar los alumnos en Firebase Authentication Console.
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:14px">
          <button class="btn btn-primary btn-sm" onclick="navigate('alumnos')">➕ Cargar Nuevos Alumnos</button>
          <button class="btn btn-secondary btn-sm" onclick="navigate('schedule')">🗓️ Subir Nuevo Horario</button>
          <button class="btn btn-secondary btn-sm" onclick="navigate('cursos-archivados')">📁 Ver Cursos Archivados</button>
        </div>
      </div>`;

    toast(`✅ Curso "${codigo}" archivado. Plataforma lista para nuevo curso.`,'success',8000);

  } catch(e) {
    log(`❌ ERROR: ${escHtml(e.message)}`);
    toast('❌ Error durante el archivado: '+e.message,'error',8000);
    const btn2 = document.getElementById('btnArchivar');
    if (btn2) { btn2.disabled=false; btn2.textContent='🗄️ Archivar y Limpiar Plataforma'; }
  }
}

async function exportarArchivoExcel(codigo) {

      if (data.clases)      clases      = [...clases,      ...data.clases];
      if (data.asistencias) asistencias = [...asistencias, ...data.asistencias];
    });

    const wb = XLSX.utils.book_new();

    // Hoja 1: Alumnos
    const alumHdr = ['Nombre','RUT','Email','Creado En'];
    const alumRows = alumnos.sort((a,b)=>(a.name||'').localeCompare(b.name||'')).map(a=>[
      a.name||'—', a.rut||'—', a.email||'—', a.createdAt||'—'
    ]);
    const wsAlum = XLSX.utils.aoa_to_sheet([alumHdr,...alumRows]);
    wsAlum['!cols'] = [{wch:32},{wch:14},{wch:36},{wch:22}];
    XLSX.utils.book_append_sheet(wb, wsAlum, 'Alumnos');

    // Hoja 2: Asistencia completa
    const allDates = [...new Set(asistencias.map(a=>a.date).filter(Boolean))].sort();
    const attHdr = ['Alumno','RUT',...allDates,'Total Presentes','% Asistencia'];
    const attRows = alumnos.map(al => {
      const dias = allDates.map(d => {
        const att = asistencias.find(a=>a.userId===al._id && a.date===d && a.present===true);
        return att ? 'Presente' : 'Ausente';
      });
      const total = dias.filter(d=>d==='Presente').length;
      const pct   = allDates.length>0 ? Math.round((total/allDates.length)*100) : 0;
      return [al.name||'—', al.rut||'—', ...dias, total, pct+'%'];
    });
    const wsAtt = XLSX.utils.aoa_to_sheet([attHdr,...attRows]);
    wsAtt['!cols'] = [{wch:32},{wch:14},...allDates.map(()=>({wch:12})),{wch:16},{wch:12}];
    XLSX.utils.book_append_sheet(wb, wsAtt, 'Asistencia');

    // Hoja 3: Clases
    const clsHdr = ['Título','Curso','Profesor','Fecha','Duración','Estado'];
    const clsRows = clases.map(c=>[
      c.title||'—', c.courseName||'—', c.teacherName||'—',
      c.scheduledAt||'—', (c.duration||60)+'min', c.status||'—'
    ]);
    const wsCls = XLSX.utils.aoa_to_sheet([clsHdr,...clsRows]);
    wsCls['!cols'] = [{wch:36},{wch:28},{wch:24},{wch:22},{wch:10},{wch:12}];
    XLSX.utils.book_append_sheet(wb, wsCls, 'Clases');

    XLSX.writeFile(wb, `Curso_${codigo}_${todayStr()}.xlsx`);
    toast(`📥 Excel del curso "${codigo}" descargado.`,'success');
  } catch(e) {
    toast('❌ Error al exportar: '+e.message,'error');
  }
}

async function renderFiscHorario(mc) {
  mc.innerHTML = `
    <div class="page-header">
      <div><h2>🗓️ Horario de Clases</h2><div class="breadcrumb">Fiscalización — solo lectura</div></div>
      <span class="badge badge-red" style="font-size:13px;padding:6px 14px">🔒 Solo Lectura</span>
    </div>
    <div id="fiscHorarioContainer"><div class="empty-state"><div class="icon">⏳</div><p>Cargando...</p></div></div>`;

  try {
    const snap = await db.collection('scheduleEntries').get();
    const cont = document.getElementById('fiscHorarioContainer');
    if (snap.empty) {
      cont.innerHTML='<div class="empty-state"><div class="icon">📭</div><p>No hay horario cargado aún.</p></div>'; return;
    }
    const entries = snap.docs.map(d=>({id:d.id,...d.data()}))
      .sort((a,b)=>(a.dayOrder||9)-(b.dayOrder||9)||(a.timeStart||'').localeCompare(b.timeStart||''));
    cont.innerHTML = `<div class="card">${renderScheduleTable(entries)}</div>`;
  } catch(e) {
    document.getElementById('fiscHorarioContainer').innerHTML=
      `<div class="empty-state"><div class="icon">❌</div><p>${escHtml(e.message)}</p></div>`;
  }
}

</script>
