<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INASEP — Plataforma de Clases en Vivo</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<!-- SheetJS para leer/escribir Excel -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
/* ══════════════════════════════════════════════
   VARIABLES — PALETA INASEP
══════════════════════════════════════════════ */
:root {
  --green-900: #0d1f14;
  --green-800: #142a1b;
  --green-700: #1e3d28;
  --green-600: #2a5536;
  --green-500: #3d7a4e;
  --green-400: #4a8c5c;
  --green-300: #68a87a;
  --green-200: #9fcfab;
  --green-100: #d4edda;
  --green-50:  #f0f8f2;
  --primary:      #4a8c5c;
  --primary-dark: #3d7a4e;
  --primary-light:#68a87a;
  --accent:       #8fbc8f;
  --sidebar-bg:   #0d1f14;
  --sidebar-nav:  #142a1b;
  --sidebar-hover:#1e3d28;
  --sidebar-border: rgba(255,255,255,0.07);
  --bg:       #f4f7f5;
  --card-bg:  #ffffff;
  --text:     #1a2e1e;
  --text-mid: #4a6651;
  --text-light:#7a9880;
  --border:   #d6e8da;
  --success: #27ae60;
  --warning: #e67e22;
  --danger:  #c0392b;
  --info:    #2980b9;
  --radius:  10px;
  --radius-lg: 16px;
  --shadow:  0 2px 14px rgba(13,31,20,0.08);
  --shadow-md: 0 6px 24px rgba(13,31,20,0.13);
  --transition: 0.18s ease;
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Sora', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.6;
}

/* ══════════════════════════════════════════════
   LAYOUT
══════════════════════════════════════════════ */
.dashboard { display: flex; min-height: 100vh; }
.sidebar {
  width: 260px;
  background: var(--sidebar-bg);
  display: flex; flex-direction: column;
  position: fixed; top:0; left:0; bottom:0;
  z-index: 200; overflow-y: auto;
  transition: transform 0.28s ease;
}
.sidebar-top {
  padding: 22px 20px 16px;
  border-bottom: 1px solid var(--sidebar-border);
  display: flex; align-items: center; gap: 12px;
}
.sidebar-top .brand { color:#fff; font-size:15px; font-weight:700; }
.sidebar-top .sub   { color: rgba(255,255,255,0.45); font-size:11px; margin-top:2px; }
.sidebar-nav { flex:1; padding: 10px 0; }
.sidebar-nav a {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 20px;
  color: rgba(255,255,255,0.65);
  text-decoration: none; font-size: 13.5px; font-weight: 500;
  transition: var(--transition); cursor: pointer;
  border-left: 3px solid transparent;
}
.sidebar-nav a:hover { background: var(--sidebar-hover); color:#fff; }
.sidebar-nav a.active {
  background: var(--sidebar-hover); color: var(--green-200);
  border-left-color: var(--green-300); font-weight: 600;
}
.sidebar-user {
  padding: 14px 20px;
  border-top: 1px solid var(--sidebar-border);
}
.sidebar-user .sb-name  { color:#fff; font-size:13px; font-weight:600; }
.sidebar-user .sb-email { color:rgba(255,255,255,0.4); font-size:11px; margin-top:2px; }
.sidebar-footer {
  padding: 12px 20px 16px;
}
.sidebar-footer button {
  background: none; border: 1px solid rgba(255,255,255,0.15);
  color: rgba(255,255,255,0.55); padding: 8px 14px;
  border-radius: 7px; font-size: 12.5px; cursor: pointer;
  width: 100%; font-family: inherit; transition: var(--transition);
}
.sidebar-footer button:hover { background: rgba(255,255,255,0.07); color:#fff; }
.main-wrapper { margin-left: 260px; flex:1; display:flex; flex-direction:column; }
.topbar {
  height: 60px; background:#fff; border-bottom:1px solid var(--border);
  display: flex; align-items: center; padding: 0 28px; gap: 16px;
  position: sticky; top:0; z-index:100; box-shadow: var(--shadow);
}
.topbar-title { font-size:16px; font-weight:700; color:var(--green-900); margin-right:auto; }
.topbar-user { display:flex; align-items:center; gap:8px; font-size:13px; font-weight:600; color:var(--text-mid); }
.avatar { width:32px; height:32px; border-radius:50%; background:var(--green-500); color:#fff; font-weight:700; font-size:13px; display:flex; align-items:center; justify-content:center; }
.mob-menu-btn { display:none; background:var(--sidebar-bg); border:none; color:#fff; width:38px; height:38px; border-radius:8px; font-size:18px; cursor:pointer; align-items:center; justify-content:center; }
.mob-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:150; }
.mob-overlay.active { display:block; }
.main-content { padding: 28px 32px; flex:1; }

/* ══════════════════════════════════════════════
   PAGE HEADER
══════════════════════════════════════════════ */
.page-header {
  margin-bottom: 24px; display:flex; align-items:flex-start;
  justify-content:space-between; flex-wrap:wrap; gap:12px;
}
.page-header h2 { font-size:22px; font-weight:700; color:var(--green-900); }
.breadcrumb { font-size:12.5px; color:var(--text-light); margin-top:3px; }
.breadcrumb a { color:var(--primary); text-decoration:none; cursor:pointer; }

/* ══════════════════════════════════════════════
   CARDS
══════════════════════════════════════════════ */
.card {
  background:var(--card-bg); border-radius:var(--radius);
  box-shadow:var(--shadow); padding:22px 24px;
  margin-bottom:18px; border:1px solid var(--border);
}
.card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; flex-wrap:wrap; gap:10px; }
.card-header h3 { font-size:16px; font-weight:700; color:var(--green-900); }
.stats-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:16px; margin-bottom:24px; }
.stat-card { background:#fff; border:1px solid var(--border); border-radius:var(--radius); padding:18px 20px; box-shadow:var(--shadow); }
.stat-card .stat-icon { font-size:26px; margin-bottom:8px; }
.stat-card .stat-value { font-size:26px; font-weight:700; color:var(--primary); line-height:1; }
.stat-card .stat-label { font-size:12px; color:var(--text-light); margin-top:4px; font-weight:500; text-transform:uppercase; letter-spacing:0.4px; }

/* ══════════════════════════════════════════════
   BUTTONS
══════════════════════════════════════════════ */
.btn {
  display:inline-flex; align-items:center; gap:6px;
  padding:10px 20px; border:none; border-radius:8px;
  font-size:13.5px; font-weight:600; font-family:inherit;
  cursor:pointer; transition:var(--transition);
  text-decoration:none; letter-spacing:0.2px; white-space:nowrap;
}
.btn-primary   { background:var(--primary); color:#fff; }
.btn-primary:hover { background:var(--primary-dark); box-shadow:0 4px 16px rgba(74,140,92,0.35); transform:translateY(-1px); }
.btn-secondary { background:#eef3f0; color:var(--text-mid); }
.btn-secondary:hover { background:#dde8e1; }
.btn-danger    { background:var(--danger); color:#fff; }
.btn-danger:hover { background:#a93226; }
.btn-success   { background:var(--success); color:#fff; }
.btn-success:hover { background:#219a52; }
.btn-warning   { background:var(--warning); color:#fff; }
.btn-warning:hover { background:#ca6f1e; }
.btn-info      { background:var(--info); color:#fff; }
.btn-info:hover { background:#1f6ea3; }
.btn-sm { padding:6px 13px; font-size:12px; border-radius:6px; }
.btn:disabled { opacity:0.55; cursor:not-allowed; transform:none !important; }
.btn-live { background: linear-gradient(135deg, #c0392b, #e74c3c); color:#fff; animation: livePulse 2s ease-in-out infinite; }
@keyframes livePulse { 0%,100%{box-shadow:0 0 0 0 rgba(192,57,43,0.4)} 50%{box-shadow:0 0 0 8px rgba(192,57,43,0)} }

/* ══════════════════════════════════════════════
   TABLE
══════════════════════════════════════════════ */
.table-wrap { overflow-x:auto; }
table { width:100%; border-collapse:collapse; font-size:13.5px; }
th, td { padding:11px 14px; text-align:left; border-bottom:1px solid #eef2ef; }
th { background:var(--green-50); font-weight:700; font-size:11px; text-transform:uppercase; letter-spacing:0.5px; color:var(--text-mid); }
tr:last-child td { border-bottom:none; }
tr:hover td { background:#f9fcfa; }

/* ══════════════════════════════════════════════
   BADGE
══════════════════════════════════════════════ */
.badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600; }
.badge-green  { background:#e6f9ee; color:#1a7a3a; }
.badge-gray   { background:#f0f0f0; color:#666; }
.badge-blue   { background:#e6f0ff; color:#1a56db; }
.badge-orange { background:#fef3e6; color:#b45309; }
.badge-red    { background:#fde8e8; color:#a93226; }
.badge-live   { background:#fde8e8; color:#c0392b; animation: blinkBadge 1.5s ease infinite; }
@keyframes blinkBadge { 0%,100%{opacity:1} 50%{opacity:0.5} }

/* ══════════════════════════════════════════════
   MODAL
══════════════════════════════════════════════ */
.modal-overlay { position:fixed; inset:0; background:rgba(13,31,20,0.65); z-index:999; display:flex; align-items:center; justify-content:center; padding:20px; backdrop-filter:blur(4px); }
.modal { background:#fff; border-radius:var(--radius-lg); padding:28px 30px; width:100%; max-width:680px; max-height:90vh; overflow-y:auto; box-shadow:0 30px 80px rgba(0,0,0,0.3); }
.modal h3 { margin-bottom:18px; font-size:18px; font-weight:700; color:var(--green-900); }
.modal-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:18px; flex-wrap:wrap; }
.modal-wide { max-width:950px; }

/* ══════════════════════════════════════════════
   FORM
══════════════════════════════════════════════ */
.form-group { margin-bottom:15px; }
.form-group label { display:block; font-size:11.5px; font-weight:600; text-transform:uppercase; letter-spacing:0.6px; color:var(--text-mid); margin-bottom:6px; }
.form-group input, .form-group select, .form-group textarea {
  width:100%; padding:11px 13px; border:2px solid var(--border);
  border-radius:8px; font-size:14px; font-family:inherit;
  background:#fafcfb; color:var(--text); transition:var(--transition); resize:vertical;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  outline:none; border-color:var(--primary); background:#fff;
  box-shadow:0 0 0 3px rgba(74,140,92,0.12);
}
.form-group small { display:block; margin-top:5px; font-size:12px; color:var(--text-light); }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:14px; }

/* ══════════════════════════════════════════════
   CLASE EN VIVO — CARD
══════════════════════════════════════════════ */
.live-class-card { background:#fff; border-radius:var(--radius-lg); border:1px solid var(--border); overflow:hidden; box-shadow:var(--shadow); transition:var(--transition); margin-bottom:16px; }
.live-class-card:hover { box-shadow:var(--shadow-md); transform:translateY(-2px); }
.live-class-header { background:linear-gradient(135deg,var(--green-900) 0%,var(--green-700) 100%); padding:16px 20px; display:flex; align-items:center; justify-content:space-between; }
.live-class-header h4 { color:#fff; font-size:15px; font-weight:700; }
.live-class-body { padding:18px 20px; }
.live-class-meta { display:flex; gap:16px; flex-wrap:wrap; font-size:13px; color:var(--text-mid); margin-bottom:14px; }
.live-class-meta span { display:flex; align-items:center; gap:5px; }
.live-class-actions { display:flex; gap:8px; flex-wrap:wrap; }

/* ══════════════════════════════════════════════
   VIDEO PLAYER — MEET LAUNCH PANEL
   Google Meet no permite embeds (X-Frame-Options SAMEORIGIN)
   Se usa un panel de lanzamiento con botón directo
══════════════════════════════════════════════ */
.video-room { background:#0d1f14; border-radius:var(--radius-lg); overflow:hidden; position:relative; min-height:340px; display:flex; align-items:center; justify-content:center; }
.video-placeholder { display:flex; flex-direction:column; align-items:center; justify-content:center; color:rgba(255,255,255,0.6); gap:12px; padding:40px; text-align:center; }
.video-placeholder .icon { font-size:60px; opacity:0.4; }
iframe.video-frame { width:100%; height:100%; min-height:500px; border:none; }

/* Panel Meet nativo (reemplaza iframe) */
.meet-launch-panel {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:20px; padding:40px 24px; text-align:center; width:100%;
  background: linear-gradient(135deg, #0d1f14 0%, #1e3d28 60%, #0d1f14 100%);
  min-height:340px;
}
.meet-launch-panel .meet-icon { font-size:56px; margin-bottom:4px; }
.meet-launch-panel h3 { color:#fff; font-size:20px; font-weight:700; margin:0; }
.meet-launch-panel p  { color:rgba(255,255,255,0.55); font-size:13px; max-width:420px; line-height:1.6; margin:0; }
.meet-launch-btn {
  display:inline-flex; align-items:center; gap:10px;
  background: linear-gradient(135deg, #1a73e8, #1557b0);
  color:#fff; border:none; border-radius:12px;
  padding:16px 36px; font-size:16px; font-weight:700;
  cursor:pointer; font-family:inherit; text-decoration:none;
  box-shadow: 0 4px 20px rgba(26,115,232,0.5);
  transition: transform 0.15s ease, box-shadow 0.15s ease;
}
.meet-launch-btn:hover { transform:translateY(-2px); box-shadow:0 8px 28px rgba(26,115,232,0.6); color:#fff; }
.meet-presence-badge {
  background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15);
  border-radius:8px; padding:8px 16px; color:rgba(255,255,255,0.7); font-size:12.5px;
  display:flex; align-items:center; gap:8px;
}
.meet-presence-badge .dot { width:8px; height:8px; border-radius:50%; background:var(--success); animation:blinkBadge 2s infinite; flex-shrink:0; }

/* ══════════════════════════════════════════════
   ASISTENCIA — CHECKBOX GRANDE
══════════════════════════════════════════════ */
.attendance-check-box {
  border:2px solid var(--border); border-radius:var(--radius-lg);
  padding:24px; text-align:center; margin-bottom:20px;
  background: linear-gradient(135deg, #f0f8f2, #fff);
}
.attendance-check-box.checked {
  border-color: var(--success);
  background: linear-gradient(135deg, #eafaf1, #f5fdf7);
}
.check-label { font-size:16px; font-weight:700; color:var(--green-900); margin-bottom:16px; display:block; }
.check-wrapper { display:flex; align-items:center; justify-content:center; gap:16px; }
.big-check {
  width:56px; height:56px; border:3px solid var(--border);
  border-radius:12px; cursor:pointer; appearance:none; -webkit-appearance:none;
  background:#fff; transition:all 0.2s ease; position:relative; flex-shrink:0;
}
.big-check:checked {
  background: var(--success); border-color: var(--success);
}
.big-check:checked::after {
  content:'✓'; position:absolute; top:50%; left:50%;
  transform:translate(-50%,-55%); color:#fff; font-size:30px; font-weight:700;
}
.big-check:hover:not(:checked) { border-color:var(--primary); background:var(--green-50); }
.check-text { font-size:15px; color:var(--text-mid); font-weight:500; text-align:left; }
.check-text strong { display:block; color:var(--green-900); font-size:16px; }
.attendance-time-stamp { font-size:12px; color:var(--text-light); margin-top:8px; font-family:'DM Mono',monospace; }

/* Tabla de asistencia diaria */
.att-table-wrap { overflow-x:auto; }
.att-table { width:100%; border-collapse:collapse; font-size:13px; min-width:500px; }
.att-table th { background:var(--green-50); font-weight:700; font-size:10.5px; text-transform:uppercase; letter-spacing:0.4px; color:var(--text-mid); padding:9px 12px; white-space:nowrap; }
.att-table td { padding:9px 12px; border-bottom:1px solid #eef2ef; vertical-align:middle; }
.att-table tr:last-child td { border-bottom:none; }
.att-table tr:hover td { background:#f9fcfa; }
.att-dot-ok  { display:inline-block; width:18px; height:18px; border-radius:4px; background:var(--success); text-align:center; line-height:18px; font-size:11px; color:#fff; }
.att-dot-no  { display:inline-block; width:18px; height:18px; border-radius:4px; background:#e0e0e0; }
.att-pct { font-weight:700; font-size:13px; }
.att-pct.good    { color:var(--success); }
.att-pct.warning { color:var(--warning); }
.att-pct.danger  { color:var(--danger);  }

/* Online indicator */
.online-dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:var(--success); animation:blinkBadge 2s ease infinite; margin-right:4px; }
.offline-dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:#ccc; margin-right:4px; }

/* ══════════════════════════════════════════════
   HORARIO
══════════════════════════════════════════════ */
.schedule-grid { display:grid; gap:8px; }
.schedule-row { display:grid; grid-template-columns:80px 1fr; align-items:center; gap:12px; padding:10px 14px; background:#fff; border:1px solid var(--border); border-radius:8px; }
.schedule-time { font-family:'DM Mono',monospace; font-size:13px; font-weight:600; color:var(--primary); }
.schedule-subject { font-size:14px; font-weight:500; color:var(--text); }
.schedule-day { font-size:12px; color:var(--text-light); margin-top:2px; }

/* ══════════════════════════════════════════════
   TOAST
══════════════════════════════════════════════ */
.toast-container { position:fixed; top:16px; right:16px; z-index:9999; display:flex; flex-direction:column; gap:8px; max-width:360px; }
.toast { background:#fff; border-radius:10px; padding:13px 16px; box-shadow:0 4px 20px rgba(0,0,0,0.15); display:flex; align-items:center; gap:10px; font-size:13.5px; font-weight:500; border-left:4px solid var(--primary); animation:slideInRight 0.25s ease; }
.toast.success { border-color:var(--success); }
.toast.error   { border-color:var(--danger); }
.toast.warning { border-color:var(--warning); }
@keyframes slideInRight { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:none} }

/* ══════════════════════════════════════════════
   AUTH
══════════════════════════════════════════════ */
.auth-wrap {
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  padding:24px 16px; background:var(--green-900);
  background-image: radial-gradient(ellipse at 20% 50%, rgba(74,140,92,0.18) 0%, transparent 60%),
                    radial-gradient(ellipse at 80% 20%, rgba(143,188,143,0.10) 0%, transparent 50%);
}
.auth-card { background:#fff; border-radius:var(--radius-lg); padding:40px 36px 36px; width:100%; max-width:430px; box-shadow:0 24px 64px rgba(0,0,0,0.35); }
.auth-logo { text-align:center; margin-bottom:28px; }
.auth-logo .brand-name { font-size:32px; font-weight:800; color:var(--green-400); letter-spacing:2px; }
.auth-logo .brand-sub { font-size:12px; color:var(--text-light); text-transform:uppercase; letter-spacing:1px; margin-top:4px; }
.auth-card h2 { font-size:19px; font-weight:700; color:var(--green-900); margin-bottom:22px; text-align:center; }
.alert { padding:11px 15px; border-radius:8px; font-size:13px; font-weight:500; display:none; margin-bottom:16px; border-left:4px solid; }
.alert-error   { background:#fdecea; color:#9b2335; border-color:#e74c3c; }
.alert-success { background:#eafaf1; color:#1e7e34; border-color:#27ae60; }

/* ══════════════════════════════════════════════
   UTILIDADES
══════════════════════════════════════════════ */
.hidden { display:none !important; }
.flex { display:flex; }
.items-center { align-items:center; }
.justify-between { justify-content:space-between; }
.gap-2 { gap:8px; }
.gap-3 { gap:12px; }
.mt-1 { margin-top:6px; }
.mt-2 { margin-top:14px; }
.mb-2 { margin-bottom:14px; }
.text-right { text-align:right; }
.text-center { text-align:center; }
.empty-state { text-align:center; padding:50px 20px; color:var(--text-light); }
.empty-state .icon { font-size:48px; margin-bottom:12px; }

/* Upload zone */
.upload-zone {
  border:2px dashed var(--border); border-radius:12px;
  padding:32px; text-align:center; cursor:pointer;
  transition:var(--transition); background:#fafcfb;
}
.upload-zone:hover, .upload-zone.dragging { border-color:var(--primary); background:var(--green-50); }
.upload-zone .icon { font-size:40px; margin-bottom:10px; }
.upload-zone p { font-size:14px; color:var(--text-mid); }
.upload-zone small { font-size:12px; color:var(--text-light); }

/* Progress bar */
.progress-bar-wrap { background:#e8f5e9; border-radius:8px; padding:4px; margin-bottom:6px; }
.progress-bar { background:var(--primary); height:8px; border-radius:8px; width:0%; transition:width 0.3s; }

/* ══════════════════════════════════════════════
   RESPONSIVE
══════════════════════════════════════════════ */
@media (max-width: 768px) {

<script>

const firebaseConfig = {

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

/* Segunda instancia para crear usuarios sin desloguear al admin */

/* ════════════════════════════════════════════════
   ESTADO GLOBAL

let currentUser = null;
let currentRole = null;
let _teacherClassTimer  = null;
let _teacherRTListener  = null;
let _attendanceListener = null;
let _heartbeatTimer     = null;  // heartbeat alumno online

/* ════════════════════════════════════════════════
   AUTH
════════════════════════════════════════════════ */
auth.onAuthStateChanged(async (user) => {
  if (user) {
    currentUser = user;
    try {
      const doc = await db.collection('users').doc(user.uid).get();
      currentRole = doc.exists ? (doc.data().role || 'student') : 'student';

  } else {

});

function showAuth() {
  document.getElementById('authSection').classList.remove('hidden');
  document.getElementById('dashboardSection').classList.add('hidden');

function showDashboard() {
  document.getElementById('authSection').classList.add('hidden');

  renderMain();
}

function formatRutInput(input) {
  let v = input.value.replace(/[^0-9kK]/g, '').toUpperCase();
  if (v.length > 1) v = v.slice(0, -1) + '-' + v.slice(-1);
  input.value = v;
}
// Variables de sesión en sala
let _currentClassId        = null;
let _classEntryTime        = null;
let _attendanceDocId       = null;
let _teacherCurrentClassId = null; // separado del alumno

function startHeartbeat(classId) {
  stopHeartbeat();
  _currentClassId = classId;
  _classEntryTime = new Date();

  _heartbeatTimer = setInterval(async () => {
    if (!currentUser) return;
    try {
      await db.collection('users').doc(currentUser.uid).update({
        lastSeen:    firebase.firestore.FieldValue.serverTimestamp(),
        lastClassId: classId,
      });
    } catch(e) {}
  }, 60000);

  if (currentUser) {
    db.collection('users').doc(currentUser.uid).update({
      lastSeen:    firebase.firestore.FieldValue.serverTimestamp(),
      lastClassId: classId,
    }).catch(()=>{});
  }
}

async function stopHeartbeat() {
  if (_heartbeatTimer) { clearInterval(_heartbeatTimer); _heartbeatTimer = null; }

  if (_currentClassId && _classEntryTime && currentUser) {
    const elapsedMs = new Date() - _classEntryTime;
    const durMin    = Math.max(1, Math.floor(elapsedMs / 60000));
    const today     = todayStr();
    try {
      const snap = await db.collection('attendance')
        .where('classId','==',_currentClassId)
        .where('userId','==',currentUser.uid)
        .where('date','==',today)
        .limit(1).get();
      if (!snap.empty) {
        await db.collection('attendance').doc(snap.docs[0].id).update({
          salidaAt:       firebase.firestore.FieldValue.serverTimestamp(),
          minutosEnClase: durMin,
          present:        true,   // garantizar presente aunque haya sido corto
        });
      } else if (elapsedMs >= 60000) {
        // Estuvo al menos 1 minuto pero no había registro — crear uno ahora
        const userDoc  = await db.collection('users').doc(currentUser.uid).get().catch(()=>null);
        const userData = userDoc?.exists ? userDoc.data() : {};
        await db.collection('attendance').add({
          classId:      _currentClassId,
          classTitle:   '—',
          userId:       currentUser.uid,
          userName:     currentUser.displayName || userData.name || currentUser.email,
          userRut:      userData.rut || '',
          date:         today,
          present:      true,
          checkedAt:    firebase.firestore.FieldValue.serverTimestamp(),
          salidaAt:     firebase.firestore.FieldValue.serverTimestamp(),
          minutosEnClase: durMin,
          online:       true,
          autoChecked:  true,
          lateRegistered: true,
        });
      }
    } catch(e) {}
  }

  if (currentUser) {
    db.collection('users').doc(currentUser.uid).update({
      lastSeen:    firebase.firestore.FieldValue.serverTimestamp(),
      lastClassId: null,
    }).catch(()=>{});
  }

  _currentClassId = null;
  _classEntryTime = null;
}
function rutToEmail(rut) {
  const clean = rut.replace(/-/g,'').replace(/\./g,'').toLowerCase();
  return `rut.${clean}@inasep-lms.cl`;
}
function validarRut(rut) {
  const clean = rut.replace(/\./g,'').replace(/-/g,'');
  if (clean.length < 2) return false;
  const dv = clean.slice(-1).toLowerCase();
  const num = clean.slice(0,-1);
  if (!/^\d+$/.test(num)) return false;
  let suma = 0, mult = 2;
  for (let i = num.length-1; i >= 0; i--) {
    suma += parseInt(num[i]) * mult;
    mult = mult === 7 ? 2 : mult + 1;
  }
  const dvEsp = 11 - (suma % 11);
  const dvCalc = dvEsp===11 ? '0' : dvEsp===10 ? 'k' : String(dvEsp);
  return dv === dvCalc;
}
function rutToPassword(rut) {
  const nums = rut.replace(/[^0-9]/g,'');
  return nums.length >= 6 ? nums.slice(-6) : nums.padEnd(6,'0');
}
function toggleAdminLogin() {
  document.getElementById('loginRutForm').classList.toggle('hidden');
  document.getElementById('loginEmailForm').classList.toggle('hidden');
  document.getElementById('alertAuth').style.display='none';
}
async function loginConRut() {
  const rut  = document.getElementById('loginRut').value.trim();
  const pass = document.getElementById('loginPassword').value;
  if (!rut||!pass) return showAuthAlert('Ingresa tu RUT y contraseña.');
  if (!validarRut(rut)) return showAuthAlert('RUT inválido. Verifica el formato (Ej: 12345678-9).');
  try {
    await auth.signInWithEmailAndPassword(rutToEmail(rut), pass);
  } catch(err) {
    const msgs = {
      'auth/user-not-found':'RUT no registrado. Contacta al administrador.',
      'auth/wrong-password':'Contraseña incorrecta.',
      'auth/invalid-credential':'RUT o contraseña incorrectos.',
      'auth/too-many-requests':'Demasiados intentos. Espera unos minutos.'
    };
    showAuthAlert(msgs[err.code]||'Error al iniciar sesión.');
  }
}
async function loginConEmail() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPasswordAdmin').value;
  if (!email||!pass) return showAuthAlert('Completa todos los campos.');
  try {
    await auth.signInWithEmailAndPassword(email, pass);
  } catch(err) {
    const msgs = {
      'auth/user-not-found':'Usuario no encontrado.',
      'auth/wrong-password':'Contraseña incorrecta.',
      'auth/invalid-credential':'Credenciales inválidas.',
      'auth/too-many-requests':'Demasiados intentos.'
    };
    showAuthAlert(msgs[err.code]||'Error al iniciar sesión.');
  }
}
function logout() {
  stopHeartbeat();
  auth.signOut();
}

// Marcar offline al cerrar pestaña — sin await (best-effort síncrono)
window.addEventListener('beforeunload', () => {
  if (_heartbeatTimer) { clearInterval(_heartbeatTimer); _heartbeatTimer = null; }
  if (currentUser) {
    // Firestore REST update síncrono via sendBeacon (no requiere await)

    db.collection('users').doc(currentUser.uid).update({
      lastSeen:    firebase.firestore.FieldValue.serverTimestamp(),
      lastClassId: null,
    }).catch(()=>{});
  }
});
function showAuthAlert(msg) {
  const el = document.getElementById('alertAuth');
  el.textContent = msg; el.className = 'alert alert-error'; el.style.display='block';
}
document.addEventListener('keydown', e => {

  document.getElementById('sidebarNav').innerHTML = links.map(l =>

  ).join('');
}

let currentView = '';
function navigate(view, params={}) {

  // Limpiar heartbeat del alumno al salir (con await no posible en sync, pero llamamos igual)
  if (currentView === 'class-room' && view !== 'class-room') {
    stopHeartbeat(); // async, best-effort
  }

}
function fmtTime(ts) {
  if (!ts) return '—';
  const d = ts.toDate ? ts.toDate() : new Date(ts);

}
function fmtDate(ts) {

  const d = ts.toDate ? ts.toDate() : new Date(ts);

}
function fmtDateTime(ts) {
  if (!ts) return '—';

}

        <div class="stat-card"><div class="stat-icon">🔴</div><div class="stat-value">${activeClasses}</div><div class="stat-label">Clases Activas</div></div>
        <div class="stat-card"><div class="stat-icon">🎓</div><div class="stat-value">${totalAlumnos}</div><div class="stat-label">Alumnos</div></div>
        <div class="stat-card"><div class="stat-icon">👨‍🏫</div><div class="stat-value">${totalProfes}</div><div class="stat-label">Profesores</div></div>
        <div class="stat-card"><div class="stat-icon">✅</div><div class="stat-value">${presentesHoy}</div><div class="stat-label">Presentes Hoy</div></div>
      </div>

      <div class="card">
        <div class="card-header"><h3>📹 Clases Recientes</h3><button class="btn btn-sm btn-primary" onclick="navigate('live-classes')">Ver Todas</button></div>
        <div id="recentClasses"><div class="empty-state"><div class="icon">⏳</div><p>Cargando...</p></div></div>
      </div>

      <div class="card">
        <div class="card-header"><h3>✅ Asistencia de Hoy — ${new Date().toLocaleDateString('es-CL',{weekday:'long',day:'numeric',month:'long'})}</h3>
          <button class="btn btn-sm btn-secondary" onclick="navigate('attendance')">Ver Completa</button>
        </div>
        <div id="todayAttendance"><div class="empty-state"><div class="icon">⏳</div><p>Cargando...</p></div></div>
      </div>`;

    // Clases recientes
    const recentSnap = await db.collection('liveClasses').limit(20).get();
    const rc = document.getElementById('recentClasses');
    if (recentSnap.empty) { rc.innerHTML='<div class="empty-state"><div class="icon">📭</div><p>No hay clases creadas aún.</p></div>'; }
    else {
      rc.innerHTML = `<div class="table-wrap"><table>
        <thead><tr><th>Título</th><th>Fecha</th><th>Duración</th><th>Estado</th><th></th></tr></thead>
        <tbody>${recentSnap.docs.map(d=>{
          const c=d.data(); const isLive=c.status==='active';
          return `<tr>
            <td><strong>${escHtml(c.title)}</strong></td>
            <td style="font-size:12px">${fmtDateTime(c.scheduledAt)}</td>
            <td>${c.duration||60} min</td>
            <td><span class="badge ${isLive?'badge-live':c.status==='finished'?'badge-gray':'badge-blue'}">${isLive?'🔴 En Vivo':c.status==='finished'?'✅ Finalizada':'📅 Programada'}</span></td>
            <td><button class="btn btn-sm btn-secondary" onclick="navigate('teacher-room',{id:'${d.id}'})">Entrar</button></td>
          </tr>`;}).join('')}
        </tbody></table></div>`;
    }

    // Asistencia hoy
    const todayAtt = document.getElementById('todayAttendance');
    if (attSnap.empty) { todayAtt.innerHTML='<div class="empty-state"><div class="icon">📭</div><p>Sin registros de asistencia hoy.</p></div>'; }
    else {
      const byClass = {};
      attSnap.docs.forEach(d => {
        const a = d.data();
        if (!byClass[a.classId]) byClass[a.classId] = { title:a.classTitle||'—', presentes:0, total:0 };
        byClass[a.classId].total++;
        if (a.present) byClass[a.classId].presentes++;
      });
      todayAtt.innerHTML = `<div class="table-wrap"><table>
        <thead><tr><th>Clase</th><th>Presentes</th><th>%</th></tr></thead>
        <tbody>${Object.values(byClass).map(b=>{
          const pct = b.total > 0 ? Math.round((b.presentes/b.total)*100) : 0;
          return `<tr><td>${escHtml(b.title)}</td><td>${b.presentes}/${b.total}</td>
            <td><span class="att-pct ${pctClass(pct)}">${pct}%</span></td></tr>`;
        }).join('')}</tbody></table></div>`;
    }
  } catch(e) {
    mc.innerHTML = `<div class="empty-state"><div class="icon">❌</div><p>${escHtml(e.message)}</p></div>`;
  }
}

/* ════════════════════════════════════════════════
   VISTA: CLASES EN VIVO (todos los roles)
════════════════════════════════════════════════ */
async function renderLiveClasses(mc) {
  const isAdmin   = currentRole==='admin';
  const isTeacher = currentRole==='teacher';

  mc.innerHTML = `
    <div class="page-header">
      <div><h2>📹 Clases en Vivo</h2><div class="breadcrumb">Clases disponibles</div></div>
      ${isAdmin ? '<button class="btn btn-primary" onclick="navigate(\'new-class\')">➕ Nueva Clase</button>' : ''}
    </div>
    <div id="classesContainer"><div class="empty-state"><div class="icon">⏳</div><p>Cargando...</p></div></div>`;

  try {
    const snap = await db.collection('liveClasses').get();

    const cont = document.getElementById('classesContainer');
    if (snap.empty) { cont.innerHTML='<div class="empty-state"><div class="icon">📭</div><p>No hay clases disponibles.</p></div>'; return; }

    const sortedDocs = snap.docs.sort((a,b) => {
      const ta = a.data().scheduledAt?.toDate?.()?.getTime() || 0;
      const tb = b.data().scheduledAt?.toDate?.()?.getTime() || 0;
      return tb - ta;
    });

    cont.innerHTML = sortedDocs.map(doc => {
      const c = doc.data();
      const isLive = c.status==='active';
      const isDone = c.status==='finished';
      return `
        <div class="live-class-card">
          <div class="live-class-header">
            <h4>${escHtml(c.title)}</h4>
            <span class="badge ${isLive?'badge-live':isDone?'badge-gray':'badge-blue'}">
              ${isLive?'🔴 EN VIVO':isDone?'✅ Finalizada':'📅 Programada'}
            </span>
          </div>
          <div class="live-class-body">
            <div class="live-class-meta">
              <span>📅 ${fmtDateTime(c.scheduledAt)}</span>
              <span>⏱ ${c.duration||60} min</span>
              ${c.courseName ? `<span>🎓 ${escHtml(c.courseName)}</span>` : ''}
              ${c.teacherName ? `<span>👨‍🏫 ${escHtml(c.teacherName)}</span>` : ''}
            </div>
            ${c.description ? `<p style="font-size:13px;color:var(--text-mid);margin-bottom:12px">${escHtml(c.description)}</p>` : ''}
            <div class="live-class-actions">
              ${isTeacher||isAdmin ? `
                <button class="btn ${isLive?'btn-live':'btn-primary'}" onclick="navigate('teacher-room',{id:'${doc.id}'})">
                  ${isLive?'🔴 Entrar a Clase':'▶️ Iniciar Clase'}
                </button>
                ${isAdmin ? `
                  <button class="btn btn-sm btn-secondary" onclick="editClass('${doc.id}')">✏️ Editar</button>
                  <button class="btn btn-sm btn-${isLive?'warning':'success'}" onclick="toggleClassStatus('${doc.id}','${c.status}')">
                    ${isLive?'⏹ Finalizar':'▶️ Activar EN VIVO'}
                  </button>
                  <button class="btn btn-sm btn-danger" onclick="deleteClass('${doc.id}')">🗑️</button>
                ` : ''}
              ` : `
                <button class="btn ${isLive?'btn-live':'btn-primary'}" onclick="navigate('class-room',{id:'${doc.id}'})">
                  ${isLive?'🔴 Entrar a Clase EN VIVO':'👁️ Ver Clase'}
                </button>
              `}
            </div>
          </div>
        </div>`;
    }).join('');
  } catch(e) {
    document.getElementById('classesContainer').innerHTML = `<div class="empty-state"><div class="icon">❌</div><p>${escHtml(e.message)}</p></div>`;
  }
}

function updateVideoFields() {
  const type  = document.getElementById('fc_videoType')?.value;
  const label = document.getElementById('videoUrlLabel');
  const help  = document.getElementById('videoUrlHelp');
  const jitsi = document.getElementById('jitsiConfig');
  const hints = {
    youtube: ['URL YouTube Live / Embed', 'Ej: https://www.youtube.com/watch?v=XXXXX'],
    meet:    ['URL Google Meet', 'Ej: https://meet.google.com/xxx-xxxx-xxx'],
    zoom:    ['URL Zoom', 'Ej: https://us02web.zoom.us/j/XXXXXXXXX'],
    teams:   ['URL Microsoft Teams', 'Pega el enlace de unión a la reunión'],
    jitsi:   ['URL Jitsi (opcional)', 'Déjala vacía para usar el nombre de sala'],
    custom:  ['URL personalizada', 'Cualquier URL compatible con iframe']
  };
  const [l,h] = hints[type]||hints.custom;
  if (label) label.textContent = l;
  if (help)  help.textContent  = h;
  if (jitsi) jitsi.classList.toggle('hidden', type!=='jitsi');
}

async function saveClass(id) {
  const title       = document.getElementById('fc_title').value.trim();
  const courseName  = document.getElementById('fc_courseName').value.trim();
  const description = document.getElementById('fc_desc').value.trim();
  const dateVal     = document.getElementById('fc_date').value;
  const duration    = parseInt(document.getElementById('fc_duration').value)||60;
  const status      = document.getElementById('fc_status').value;
  const videoType   = document.getElementById('fc_videoType').value;
  let   videoUrl    = document.getElementById('fc_videoUrl').value.trim();
  const jitsiRoom   = document.getElementById('fc_jitsiRoom')?.value.trim()||'';
  const teacherSel  = document.getElementById('fc_teacher');
  const teacherUid  = teacherSel?.value||'';
  const teacherName = teacherUid ? (teacherSel.selectedOptions[0]?.getAttribute('data-name')||'') : '';

  if (videoType==='jitsi' && !videoUrl && jitsiRoom)
    videoUrl = `https://meet.jit.si/${encodeURIComponent(jitsiRoom)}`;

  if (!title||title.length<3) return toast('⚠️ El título debe tener al menos 3 caracteres.','warning');
  if (!dateVal) return toast('⚠️ Selecciona fecha y hora.','warning');

  const data = {
    title, courseName, description,
    scheduledAt: firebase.firestore.Timestamp.fromDate(new Date(dateVal)),
    duration, status, videoType, videoUrl, jitsiRoom,
    teacherUid, teacherName,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
    createdBy: currentUser.uid
  };
  try {
    if (id) {
      await db.collection('liveClasses').doc(id).update(data);
      toast('✅ Clase actualizada.','success');
    } else {
      data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
      await db.collection('liveClasses').add(data);
      toast('✅ Clase creada correctamente.','success');
    }
    navigate('live-classes');
  } catch(e) { toast('❌ Error: '+e.message,'error'); }
}

async function editClass(id) {
  const doc = await db.collection('liveClasses').doc(id).get();
  if (doc.exists) navigate('new-class',{id,data:{id,...doc.data()}});
}
async function deleteClass(id) {
  if (!confirm('¿Eliminar esta clase y todos sus registros de asistencia?')) return;
  const batch = db.batch();
  const attSnap = await db.collection('attendance').where('classId','==',id).get();
  attSnap.docs.forEach(d=>batch.delete(d.ref));
  batch.delete(db.collection('liveClasses').doc(id));
  await batch.commit();
  toast('🗑️ Clase eliminada.','success');
  navigate('live-classes');
}
async function toggleClassStatus(id, current) {
  const newStatus = current==='active' ? 'finished' : 'active';
  try {
    await db.collection('liveClasses').doc(id).update({
      status:        newStatus,
      updatedAt:     firebase.firestore.FieldValue.serverTimestamp(),
      teacherActive: newStatus === 'active',
      teacherUid:    currentUser.uid,
    });
    toast(`✅ Clase ${newStatus==='active'?'activada en vivo':'finalizada'}.`,'success');
    navigate('live-classes');
  } catch(e) {
    toast('❌ Error al cambiar estado: '+e.message,'error');
  }
}

/* ════════════════════════════════════════════════
   VISTA: SALA DEL ALUMNO (class-room)
   — Asistencia automática al entrar + video Meet
════════════════════════════════════════════════ */
async function renderClassRoom(mc, params={}) {
  const classId = params.id;
  if (!classId) { mc.innerHTML='<div class="empty-state"><div class="icon">❌</div><p>Clase no encontrada.</p></div>'; return; }

  const doc = await db.collection('liveClasses').doc(classId).get();
  if (!doc.exists) { mc.innerHTML='<div class="empty-state"><div class="icon">❌</div><p>Clase no encontrada.</p></div>'; return; }
  const cls = doc.data();

  // Iniciar heartbeat del alumno (se actualiza cada 60s mientras está en la sala)
  if (currentRole === 'student') startHeartbeat(classId);

  // Buscar asistencia del alumno hoy
  const today = todayStr();
  const attSnap = await db.collection('attendance')
    .where('classId','==',classId)
    .where('userId','==',currentUser.uid)
    .where('date','==',today)
    .limit(1).get();

  let attDoc   = attSnap.empty ? null : {id:attSnap.docs[0].id, ...attSnap.docs[0].data()};
  let isPresent = attDoc?.present === true;
  let checkedTime = attDoc?.checkedAt ? fmtDateTime(attDoc.checkedAt) : null;

  // ── ASISTENCIA AUTOMÁTICA al entrar si clase activa ──
  if (!isPresent && cls.status === 'active' && currentRole === 'student') {
    try {
      const userDoc = await db.collection('users').doc(currentUser.uid).get();
      const userData = userDoc.exists ? userDoc.data() : {};
      const newAtt = await db.collection('attendance').add({
        classId,
        classTitle: cls.title || '—',
        userId:      currentUser.uid,
        userName:    currentUser.displayName || userData.name || currentUser.email,
        userRut:     userData.rut || '',
        date:        today,
        present:     true,
        checkedAt:   firebase.firestore.FieldValue.serverTimestamp(),
        online:      true,
        autoChecked: true,
      });
      await db.collection('users').doc(currentUser.uid).update({
        lastSeen:    firebase.firestore.FieldValue.serverTimestamp(),
        lastClassId: classId,
      });
      isPresent   = true;
      checkedTime = new Date().toLocaleTimeString('es-CL');
    } catch(e) { /* no crítico */ }
  }

  // Construir panel de video (Meet no permite embeds, usamos panel de lanzamiento)
  const meetUrl = cls.meetUrl || cls.videoUrl || '';
  let videoEmbed = '';
  if (meetUrl) {
    if (cls.videoType==='youtube') {
      // YouTube sí permite embed
      const ytMatch = meetUrl.match(/(?:v=|youtu\.be\/)([^&?]+)/);
      if (ytMatch) {
        videoEmbed = `<iframe class="video-frame" src="https://www.youtube.com/embed/${ytMatch[1]}?autoplay=0" allow="camera;microphone;fullscreen;autoplay" allowfullscreen></iframe>`;
      }
    } else if (cls.videoType==='jitsi' && cls.jitsiRoom) {
      // Jitsi sí permite embed
      videoEmbed = `<iframe class="video-frame" src="https://meet.jit.si/${encodeURIComponent(cls.jitsiRoom)}#config.startWithAudioMuted=false" allow="camera;microphone;fullscreen;display-capture;autoplay" allowfullscreen></iframe>`;
    } else {
      // Google Meet NO permite iframe — panel de lanzamiento nativo
      videoEmbed = `<div class="meet-launch-panel">
        <div class="meet-icon">📹</div>
        <h3>Clase en Vivo — ${escHtml(cls.title)}</h3>
        <p>Google Meet no puede mostrarse dentro de la plataforma. Haz clic en el botón para unirte a la videollamada en una nueva pestaña. Tu asistencia queda registrada aquí automáticamente.</p>
        <a href="${escHtml(meetUrl)}" target="_blank" rel="noopener noreferrer" class="meet-launch-btn" onclick="registrarAperturaMeet('${classId}')">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M22 8.5l-6 4 6 4V8.5z" fill="#fff"/><rect x="2" y="6" width="14" height="12" rx="2" fill="#fff" fill-opacity=".9"/></svg>
          Unirse a Google Meet ↗
        </a>
        <div class="meet-presence-badge">
          <span class="dot"></span>
          <span id="meetOpenCount">Tu asistencia está registrada — mantén esta pestaña abierta</span>
        </div>
        <div style="font-size:11.5px;color:rgba(255,255,255,0.35);margin-top:4px">También puedes usar la app de Google Meet en tu celular</div>
      </div>`;
    }
  } else if (cls.status !== 'active') {
    videoEmbed = `<div class="video-placeholder"><div class="icon">⏳</div><p>La clase aún no ha comenzado.</p><p style="font-size:13px;opacity:0.6;margin-top:8px">Cuando el profesor inicie la clase, aparecerá el enlace de Meet aquí.</p></div>`;
  } else {
    videoEmbed = `<div class="video-placeholder"><div class="icon">📡</div><p>El enlace de videoconferencia aún no está disponible.</p></div>`;
  }

  mc.innerHTML = `
    <div class="page-header">
      <div>
        <h2>${escHtml(cls.title)}</h2>
        <div class="breadcrumb"><a onclick="navigate('live-classes')">← Clases</a> › ${escHtml(cls.title)}</div>
      </div>
      ${cls.status==='active' ? '<span class="badge badge-live">🔴 EN VIVO</span>' : ''}
    </div>

    <!-- ESTADO DE ASISTENCIA AUTOMÁTICA -->
    <div class="attendance-check-box ${isPresent?'checked':''}" id="attCheckBox" style="margin-bottom:18px">
      <span class="check-label">📋 Registro de Asistencia — ${new Date().toLocaleDateString('es-CL',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</span>
      <div class="check-wrapper">
        <div style="width:56px;height:56px;border-radius:12px;background:${isPresent?'var(--success)':'#e0e0e0'};display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0">
          ${isPresent ? '✅' : (cls.status==='active' ? '⏳' : '🔒')}
        </div>
        <div class="check-text">
          <strong>${isPresent ? '✅ Asistencia Registrada Automáticamente' : cls.status==='active' ? 'Registrando asistencia...' : 'Clase no activa'}</strong>
          ${isPresent
            ? `<span style="color:var(--success)">Tu asistencia fue registrada al ingresar a la clase.</span>`
            : cls.status==='active'
              ? `<span>Tu asistencia se registra automáticamente al entrar.</span>`
              : `<span style="color:var(--danger)">La clase aún no está activa. Espera que el profesor la inicie.</span>`
          }
          ${checkedTime ? `<div class="attendance-time-stamp">Registrado: ${checkedTime}</div>` : ''}
        </div>
      </div>
    </div>

    <!-- VIDEO -->
    <div class="card" style="padding:0;overflow:hidden;margin-bottom:16px">
      <div class="video-room" id="videoRoom">${videoEmbed}</div>
    </div>

    ${meetUrl && cls.status==='active' && (cls.videoType==='youtube'||cls.videoType==='jitsi') ? `
    <div class="card">
      <div class="card-header"><h3>🔗 Enlace Directo a la Clase</h3></div>
      <p style="font-size:13px;color:var(--text-mid);margin-bottom:12px">¿El video no carga? Únete directamente:</p>
      <a href="${escHtml(meetUrl)}" target="_blank" rel="noopener noreferrer" class="btn btn-primary">
        📹 Abrir en Nueva Pestaña ↗
      </a>
    </div>` : ''}

    ${cls.status !== 'active' ? `
    <div class="card" style="border-color:var(--warning);background:#fffdf5">
      <div style="display:flex;align-items:center;gap:12px">
        <div style="font-size:32px">⏳</div>
        <div>
          <div style="font-weight:700;color:var(--green-900);margin-bottom:4px">Esperando que el profesor inicie la clase</div>
          <div style="font-size:13px;color:var(--text-mid)">Cuando el docente presione "Iniciar Clase", la sala de Google Meet aparecerá automáticamente en esta página.</div>
        </div>
      </div>
    </div>` : ''}

    <!-- BOTÓN SALIR ALUMNO -->
    <div style="margin-top:8px">
      <button class="btn btn-secondary" onclick="salirSalaAlumno('${classId}')">🚪 Salir de la Clase</button>
    </div>`;
}

async function salirSalaAlumno(classId) {
  await stopHeartbeat();
  navigate('post-class-student', {id: classId});
}

/* Registrar que el alumno abrió Meet (mejora indicador online) */
function registrarAperturaMeet(classId) {
  if (!currentUser || !classId) return;
  db.collection('users').doc(currentUser.uid).update({
    lastSeen:    firebase.firestore.FieldValue.serverTimestamp(),
    lastClassId: classId,
    meetOpened:  true,
  }).catch(()=>{});
}

async function marcarAsistencia(classId, classTitle, checkbox) {
  // Verificar que la clase está activa
  const clsDoc = await db.collection('liveClasses').doc(classId).get();
  if (!clsDoc.exists || clsDoc.data().status !== 'active') {
    toast('⛔ La clase no está activa. No puedes marcar asistencia ahora.','error');
    checkbox.checked = false;
    return;
  }

  if (!checkbox.checked) return; // solo registramos al marcar, no al desmarcar

  checkbox.disabled = true;
  const today = todayStr();
  try {
    // Obtener datos del usuario
    const userDoc = await db.collection('users').doc(currentUser.uid).get();
    const userData = userDoc.exists ? userDoc.data() : {};

    await db.collection('attendance').add({
      classId, classTitle,
      userId:      currentUser.uid,
      userName:    currentUser.displayName || userData.name || currentUser.email,
      userRut:     userData.rut || '',
      date:        today,
      present:     true,
      checkedAt:   firebase.firestore.FieldValue.serverTimestamp(),
      online:      true,
    });

    // Actualizar lastSeen para presencia online
    await db.collection('users').doc(currentUser.uid).update({
      lastSeen: firebase.firestore.FieldValue.serverTimestamp(),
      lastClassId: classId,
    });

    const box = document.getElementById('attCheckBox');
    if (box) {
      box.classList.add('checked');
      box.querySelector('.check-text strong').textContent = '✅ Asistencia Registrada';
      box.querySelector('.check-text span').textContent = 'Tu asistencia fue registrada correctamente.';
    }
    toast('✅ ¡Asistencia registrada! Bienvenido a la clase.','success');
  } catch(e) {
    toast('❌ Error al registrar asistencia: '+e.message,'error');
    checkbox.checked = false;
    checkbox.disabled = false;
  }
}

/* ════════════════════════════════════════════════
   VISTA: SALA DEL PROFESOR (teacher-room)
   — Con Google Meet automático y asistencia automática
════════════════════════════════════════════════ */
let _teacherSessionDocId = null;
let _teacherClassStart   = null;

/* Genera un ID único para la sala Meet usando la cuenta Workspace configurada */

async function iniciarClaseConMeet(classId) {
  const btn = document.getElementById('btnIniciarClase');
  if (btn) { btn.disabled=true; btn.textContent='⏳ Iniciando...'; }

  try {
    // Leer configuración de Meet
    const cfgDoc = await db.collection('config').doc('googleWorkspace').get();
    const cfg    = cfgDoc.exists ? cfgDoc.data() : {};
    const meetUrl     = cfg.meetUrl || '';
    const whoCanStart = cfg.whoCanStart || 'both';

    // Verificar permisos
    if (currentRole === 'teacher' && whoCanStart === 'admin') {
      if (btn) { btn.disabled=false; btn.textContent='▶️ Iniciar Clase con Google Meet'; }
      return openModal(`
        <h3>🔒 Sin permiso para iniciar</h3>
        <p style="font-size:14px;color:var(--text-mid);margin-bottom:18px;line-height:1.7">
          El administrador ha configurado que solo él puede iniciar las clases.<br><br>
          Contacta al administrador para que inicie la clase o te otorgue permisos.
        </p>
        <div class="modal-actions">
          <button class="btn btn-secondary" onclick="closeModal()">Cerrar</button>
        </div>`);
    }

    if (!meetUrl) {
      if (btn) { btn.disabled=false; btn.textContent='▶️ Iniciar Clase con Google Meet'; }
      return openModal(`
        <h3>⚙️ Sala Meet no configurada</h3>
        <p style="font-size:14px;color:var(--text-mid);margin-bottom:18px;line-height:1.7">
          Aún no hay una sala de Google Meet configurada en la plataforma.<br><br>
          El administrador debe ir a <strong>⚙️ Configuración</strong> y pegar el enlace permanente de la sala Meet de INASEP.
        </p>
        <div class="modal-actions">
          <button class="btn btn-secondary" onclick="closeModal()">Cerrar</button>
          ${currentRole==='admin' ? `<button class="btn btn-primary" onclick="closeModal();navigate('config')">Ir a Configuración →</button>` : ''}
        </div>`);
    }

    // 1. Activar la clase con la URL fija de Meet
    await db.collection('liveClasses').doc(classId).update({
      status:        'active',
      videoType:     'meet',
      videoUrl:      meetUrl,
      meetUrl:       meetUrl,
      meetStartedAt: firebase.firestore.FieldValue.serverTimestamp(),
      teacherActive: true,
      teacherUid:    currentUser.uid,
      startedBy:     currentRole,
      updatedAt:     firebase.firestore.FieldValue.serverTimestamp(),
    });

    // 2. Registrar asistencia automática del profesor/admin
    const today = todayStr();
    const userDoc = await db.collection('users').doc(currentUser.uid).get();
    const userData = userDoc.exists ? userDoc.data() : {};
    const clsDoc2 = await db.collection('liveClasses').doc(classId).get();
    const classTitle = clsDoc2.data()?.title || '—';

    const attExist = await db.collection('attendance')
      .where('classId','==',classId)
      .where('userId','==',currentUser.uid)
      .where('date','==',today)
      .limit(1).get();

    if (attExist.empty) {
      await db.collection('attendance').add({
        classId, classTitle,
        userId:      currentUser.uid,
        userName:    currentUser.displayName || userData.name || currentUser.email,
        userRut:     userData.rut || '',
        userRole:    currentRole,
        date:        today,
        present:     true,
        checkedAt:   firebase.firestore.FieldValue.serverTimestamp(),
        online:      true,
        autoChecked: true,
      });
    }

    toast('✅ Clase iniciada. Tu asistencia fue registrada.', 'success', 4000);

    // 3. Recargar la sala
    navigate('teacher-room', {id: classId});

  } catch(e) {
    toast('❌ Error al iniciar clase: '+e.message, 'error');
    if (btn) { btn.disabled=false; btn.textContent='▶️ Iniciar Clase con Google Meet'; }
  }
}

async function renderTeacherRoom(mc, params={}) {
  const classId = params.id;
  if (!classId) { mc.innerHTML='<div class="empty-state"><div class="icon">❌</div><p>Clase no encontrada.</p></div>'; return; }

  const doc = await db.collection('liveClasses').doc(classId).get();
  if (!doc.exists) { mc.innerHTML='<div class="empty-state"><div class="icon">❌</div><p>Clase no encontrada.</p></div>'; return; }
  const cls = doc.data();
  const durMin = cls.duration||60;
  const isActive = cls.status === 'active';

  // Marcar classId activo para el profesor
  _teacherCurrentClassId = classId;

  // Limpiar estado previo por si no se llamó salirDeSala() antes de re-entrar
  if (_teacherClassTimer) { clearInterval(_teacherClassTimer); _teacherClassTimer = null; }
  if (_teacherRTListener) { _teacherRTListener(); _teacherRTListener = null; }
  _teacherSessionDocId = null;

  // Registrar sesión del profesor (solo si es teacher y clase activa)
  _teacherClassStart = new Date();
  if (currentRole==='teacher' && isActive) {
    try {
      const sesDoc = await db.collection('teacherSessions').add({
        teacherUid:  currentUser.uid,
        teacherName: currentUser.displayName||currentUser.email,
        classId,
        classTitle:  cls.title||'—',
        entradaAt:   firebase.firestore.FieldValue.serverTimestamp(),
        salidaAt:    null,
        duracionSeg: 0,
        createdAt:   firebase.firestore.FieldValue.serverTimestamp(),
      });
      _teacherSessionDocId = sesDoc.id;
    } catch(e) { /* no crítico */ }
  }

  // Embed video (Meet no permite iframe)
  let videoEmbed = '';
  const meetUrl = cls.meetUrl || cls.videoUrl || '';
  if (meetUrl) {
    if (cls.videoType==='youtube') {
      const ytMatch = meetUrl.match(/(?:v=|youtu\.be\/)([^&?]+)/);
      if (ytMatch) videoEmbed = `<iframe class="video-frame" src="https://www.youtube.com/embed/${ytMatch[1]}?autoplay=0" allow="camera;microphone;fullscreen;autoplay" allowfullscreen></iframe>`;
    } else if (cls.videoType==='jitsi' && cls.jitsiRoom) {
      videoEmbed = `<iframe class="video-frame" src="https://meet.jit.si/${encodeURIComponent(cls.jitsiRoom)}#config.startWithAudioMuted=false" allow="camera;microphone;fullscreen;display-capture;autoplay" allowfullscreen></iframe>`;
    } else {
      // Google Meet — panel de lanzamiento
      videoEmbed = `<div class="meet-launch-panel">
        <div class="meet-icon">📹</div>
        <h3>Sala Google Meet — ${escHtml(cls.title)}</h3>
        <p>Google Meet no puede mostrarse en un iframe. Abre la sala en una nueva pestaña para conducir la clase.</p>
        <a href="${escHtml(meetUrl)}" target="_blank" rel="noopener noreferrer" class="meet-launch-btn">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M22 8.5l-6 4 6 4V8.5z" fill="#fff"/><rect x="2" y="6" width="14" height="12" rx="2" fill="#fff" fill-opacity=".9"/></svg>
          Abrir Google Meet ↗
        </a>
        <div class="meet-presence-badge">
          <span class="dot"></span>
          <span>Clase activa — los alumnos pueden unirse ahora</span>
        </div>
      </div>`;
    }
  } else if (!isActive) {
    videoEmbed = `<div class="video-placeholder"><div class="icon">📡</div><p>La clase aún no ha iniciado.</p><p style="font-size:13px;margin-top:8px;opacity:0.6">Presiona "Iniciar Clase" para generar la sala Meet.</p></div>`;
  } else {
    videoEmbed = `<div class="video-placeholder"><div class="icon">📡</div><p>Sin enlace de video configurado.</p></div>`;
  }

  // Verificar asistencia del profe para hoy
  const today = todayStr();
  let teacherAttRegistered = false;
  try {
    const tAtt = await db.collection('attendance')
      .where('classId','==',classId)
      .where('userId','==',currentUser.uid)
      .where('date','==',today)
      .limit(1).get();
    teacherAttRegistered = !tAtt.empty;
  } catch(e) {}

  mc.innerHTML = `
    <div class="page-header">
      <div>
        <h2>👨‍🏫 ${escHtml(cls.title)}</h2>
        <div class="breadcrumb"><a onclick="salirDeSala()">← Mis Clases</a> › Vista Profesor</div>
      </div>
      ${isActive ? '<span class="badge badge-live">🔴 EN VIVO</span>' : '<span class="badge badge-gray">📅 No activa</span>'}
    </div>

    <!-- PANEL INICIAR / ESTADO CLASE -->
    ${!isActive ? `
    <div style="background:linear-gradient(135deg,#1a2e1e,#2a5536);border-radius:var(--radius-lg);padding:28px 24px;margin-bottom:20px;text-align:center;border:2px dashed rgba(255,255,255,0.15)">
      <div style="font-size:40px;margin-bottom:12px">🎬</div>
      <h3 style="color:#fff;font-size:18px;font-weight:700;margin-bottom:8px">La clase aún no ha comenzado</h3>
      <p style="color:rgba(255,255,255,0.6);font-size:13px;margin-bottom:20px">Al presionar el botón se activará la clase en vivo, se habilitará el enlace de Google Meet y se registrará tu asistencia.</p>
      <div id="iniciarClasePanel">
        <button id="btnIniciarClase" class="btn btn-success" style="padding:14px 32px;font-size:15px;border-radius:10px" onclick="iniciarClaseConMeet('${classId}')">
          ▶️ Iniciar Clase con Google Meet
        </button>
        <div style="margin-top:14px;font-size:12px;color:rgba(255,255,255,0.35)" id="iniciarClaseNote">Verificando permisos...</div>
      </div>
    </div>` : `
    <!-- TIMER DOCENCIA (solo si activa) -->
    <div style="background:linear-gradient(135deg,var(--green-900),var(--green-700));border-radius:var(--radius);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;color:#fff;margin-bottom:16px;flex-wrap:wrap;gap:12px">
      <div>
        <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,0.5);margin-bottom:2px">⏱ Tiempo de Docencia</div>
        <div style="font-family:'DM Mono',monospace;font-size:32px;font-weight:500;color:var(--green-200);letter-spacing:3px" id="teacherTimer">00:00:00</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px">
        <div>
          <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,0.5);margin-bottom:2px">Duración Total</div>
          <div style="font-size:22px;font-family:'DM Mono';color:var(--green-100)">${durMin} min</div>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <div style="background:rgba(255,255,255,0.1);border-radius:8px;padding:6px 12px;font-size:12px;color:rgba(255,255,255,0.8)">
            ${teacherAttRegistered ? '✅ Tu asistencia registrada' : '⏳ Registrando asistencia...'}
          </div>
          ${meetUrl ? `<a href="${escHtml(meetUrl)}" target="_blank" rel="noopener" style="background:rgba(255,255,255,0.15);border-radius:8px;padding:6px 12px;font-size:12px;color:#fff;text-decoration:none;font-weight:600">📹 Abrir Meet ↗</a>` : ''}
        </div>
      </div>
    </div>

    <!-- CONTROLES ADMIN (finalizar clase) -->
    ${currentRole==='admin' ? `
    <div class="card" style="margin-bottom:16px;padding:14px 18px">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">
        <span style="font-size:13px;font-weight:600;color:var(--text-mid)">⚙️ Control de Clase (Admin)</span>
        <button class="btn btn-sm btn-warning" onclick="toggleClassStatus('${classId}','active')">⏹ Finalizar Clase</button>
      </div>
    </div>` : ''}`}

    <!-- LINK MEET VISIBLE -->
    ${meetUrl && isActive ? `
    <div class="card" style="margin-bottom:16px;background:linear-gradient(135deg,#e8f5f0,#fff);border-color:var(--green-300)">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px">
        <div>
          <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--primary);margin-bottom:4px">🎥 Sala Google Meet Activa</div>
          <div style="font-family:'DM Mono';font-size:14px;color:var(--green-900);word-break:break-all">${escHtml(meetUrl)}</div>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-sm btn-secondary" onclick="navigator.clipboard.writeText('${escHtml(meetUrl)}').then(()=>toast('✅ Enlace copiado','success'))">📋 Copiar</button>
          <a href="${escHtml(meetUrl)}" target="_blank" rel="noopener" class="btn btn-primary btn-sm">Abrir Meet ↗</a>
        </div>
      </div>
    </div>` : ''}

    <!-- ALUMNOS EN TIEMPO REAL -->
    <div class="card" style="margin-bottom:16px">
      <div class="card-header">
        <h3>👥 Alumnos Presentes Hoy</h3>
        <button class="btn btn-sm btn-secondary" onclick="recargarAlumnosRT('${classId}')">🔄 Actualizar</button>
      </div>
      <div id="teacherAlumnosRT"><div class="empty-state"><div class="icon">⏳</div><p>Cargando...</p></div></div>

    <!-- VIDEO -->
    <div class="card" style="padding:0;overflow:hidden;margin-bottom:16px">
      <div class="video-room" id="videoRoom">${videoEmbed}</div>

    <!-- BOTÓN SALIR -->
    <div style="display:flex;gap:12px;flex-wrap:wrap">
      <button class="btn btn-secondary" onclick="salirDeSala('${classId}')">🚪 Salir de la Sala</button>
    </div>`;

    _teacherClassStart = new Date();
    _teacherClassTimer = setInterval(() => {
      const secs = Math.floor((new Date() - _teacherClassStart) / 1000);
      const h = String(Math.floor(secs/3600)).padStart(2,'0');
      const m = String(Math.floor((secs%3600)/60)).padStart(2,'0');
      const s = String(secs%60).padStart(2,'0');
      const el = document.getElementById('teacherTimer');
      if (el) el.textContent = `${h}:${m}:${s}`;
      else { clearInterval(_teacherClassTimer); _teacherClassTimer=null; }
    }, 1000);
  }

  // Cargar alumnos en tiempo real
  cargarAlumnosRT(classId);

  // Verificar permiso para iniciar (solo si clase no activa)

      const whoCanStart = cfg.whoCanStart || 'both';

function recargarAlumnosRT(classId) {
  if (_teacherRTListener) { _teacherRTListener(); _teacherRTListener = null; }
  cargarAlumnosRT(classId);
}

function cargarAlumnosRT(classId) {
  const cont = document.getElementById('teacherAlumnosRT');
  if (!cont) return;
  if (_teacherRTListener) _teacherRTListener();

  _teacherRTListener = db.collection('attendance')
    .where('classId','==',classId)
    .where('date','==',todayStr())
    .onSnapshot(async snap => {
      const cont2 = document.getElementById('teacherAlumnosRT');
      if (!cont2) { if(_teacherRTListener){_teacherRTListener();_teacherRTListener=null;} return; }
      if (snap.empty) {
        cont2.innerHTML='<div class="empty-state"><div class="icon">📭</div><p>Aún no hay asistencias registradas hoy.</p></div>'; return;
      }

      // Separar alumnos y profesores
      const allDocs = snap.docs.map(d=>({id:d.id,...d.data()}));
      const teacherDocs = allDocs.filter(a=>a.userRole==='teacher');
      const studentDocs = allDocs.filter(a=>a.userRole!=='teacher');

      // Obtener lastSeen para indicador online
      const userIds = [...new Set(allDocs.map(a=>a.userId))];
      const usersData = {};
      await Promise.all(userIds.map(async uid => {
        try {
          const u = await db.collection('users').doc(uid).get();
          if (u.exists) usersData[uid] = u.data();
        } catch(e) {}
      }));

      const now = Date.now();
      const isOnline = (a) => {
        const ud = usersData[a.userId]||{};
        const ls = ud.lastSeen?.toDate?.();
        return ls && (now - ls.getTime()) < 90000 && ud.lastClassId === classId;
      };

      const rowHtml = (a) => {
        const online = isOnline(a);
        const isTeacherRow = a.userRole==='teacher';
        return `<tr style="${isTeacherRow?'background:#f0f8f2;':''}">
          <td><div style="display:flex;align-items:center;gap:8px">
            <div style="width:28px;height:28px;border-radius:50%;background:${isTeacherRow?'var(--warning)':'var(--green-500)'};color:#fff;font-weight:700;font-size:11px;display:inline-flex;align-items:center;justify-content:center">${(a.userName||'?').slice(0,2).toUpperCase()}</div>
            <div>
              <strong>${escHtml(a.userName||'—')}</strong>
              ${isTeacherRow?'<span class="badge badge-orange" style="margin-left:6px;font-size:10px">Profesor</span>':''}
              ${a.autoChecked?'<span style="font-size:10px;color:var(--text-light);margin-left:4px">auto</span>':''}
            </div>
          </div></td>
          <td><span style="font-family:'DM Mono';font-size:12px">${escHtml(a.userRut||'—')}</span></td>
          <td><span class="badge badge-green">✅ Presente</span></td>
          <td style="font-size:12px">${fmtDateTime(a.checkedAt)}</td>
          <td><span class="${online?'online-dot':'offline-dot'}"></span>${online?'<span style="color:var(--success);font-size:12px;font-weight:600">Online</span>':'<span style="color:#aaa;font-size:12px">—</span>'}</td>
        </tr>`;
      };

      cont2.innerHTML = `
        <div style="margin-bottom:10px;display:flex;gap:14px;align-items:center;flex-wrap:wrap">
          <span class="badge badge-orange">👨‍🏫 Profesores: ${teacherDocs.filter(a=>a.present).length}</span>
          <span class="badge badge-green">🎓 Alumnos presentes: ${studentDocs.filter(a=>a.present).length}</span>
          <span class="badge badge-blue">🟢 Online ahora: ${allDocs.filter(a=>isOnline(a)).length}</span>
        </div>
        <div class="table-wrap"><table>
          <thead><tr><th>Participante</th><th>RUT</th><th>Estado</th><th>Hora de Registro</th><th>Online</th></tr></thead>
          <tbody>
            ${[...teacherDocs, ...studentDocs].map(rowHtml).join('')}
          </tbody></table></div>`;
    }, err=>{
      const c=document.getElementById('teacherAlumnosRT');
      if(c) c.innerHTML=`<p style="color:var(--danger);padding:12px">${err.message}</p>`;
    });
}

async function salirDeSala(classId) {
  if (_teacherClassTimer) { clearInterval(_teacherClassTimer); _teacherClassTimer=null; }
  if (_teacherRTListener) { _teacherRTListener(); _teacherRTListener=null; }

  const cid = classId || _teacherCurrentClassId || _currentClassId;

  // Registrar salida del profesor en teacherSessions + attendance
  if (_teacherSessionDocId && _teacherClassStart) {
    try {
      const durSeg = Math.floor((new Date()-_teacherClassStart)/1000);
      await db.collection('teacherSessions').doc(_teacherSessionDocId).update({
        salidaAt:    firebase.firestore.FieldValue.serverTimestamp(),
        duracionSeg: durSeg,
      });
      if (cid) {
        const today  = todayStr();
        const durMin = Math.max(1, Math.round(durSeg/60));
        const snap   = await db.collection('attendance')
          .where('classId','==',cid)
          .where('userId','==',currentUser.uid)
          .where('date','==',today)
          .limit(1).get();
        if (!snap.empty) {
          await db.collection('attendance').doc(snap.docs[0].id).update({
            salidaAt:       firebase.firestore.FieldValue.serverTimestamp(),
            minutosEnClase: durMin,
          });
        }
      }
    } catch(e) {}
    _teacherSessionDocId = null;
    _teacherClassStart   = null;
  }

  _teacherCurrentClassId = null;

  if (cid && (currentRole==='teacher'||currentRole==='admin')) {
    navigate('post-class', {id: cid});
  } else {
    navigate('live-classes');
  }
}

async function renderMyAttendance(mc) {

    <div id="myAttContainer"><div class="empty-state"><div class="icon">⏳</div><p>Cargando...</p></div></div>`;

  try {
    const snap = await db.collection('attendance')
      .where('userId','==',currentUser.uid)
      .get();
    const cont = document.getElementById('myAttContainer');
    if (snap.empty) { cont.innerHTML='<div class="empty-state"><div class="icon">📭</div><p>Sin registros de asistencia aún.</p></div>'; return; }
    const sortedDocs = snap.docs.sort((a,b)=>(b.data().date||'').localeCompare(a.data().date||''));

    // Calcular % por clase
    const byClass = {};
    snap.docs.forEach(d => {
      const a=d.data();
      if (!byClass[a.classId]) byClass[a.classId]={title:a.classTitle||'—',dias:[]};
      byClass[a.classId].dias.push({date:a.date,present:a.present,time:a.checkedAt});
    });

    const totalDias    = snap.size;
    const totalPre     = snap.docs.filter(d=>d.data().present).length;
    const pct          = totalDias>0 ? Math.round((totalPre/totalDias)*100) : 0;
    // Tiempo total acumulado del curso (suma de minutosEnClase de todos los módulos)
    const totalMinCurso = snap.docs.reduce((acc,d)=>acc+(d.data().minutosEnClase||0),0);
    const totalHrsCurso = Math.floor(totalMinCurso/60);
    const restMinCurso  = totalMinCurso % 60;
    const tiempoCursoStr = totalMinCurso>0
      ? (totalHrsCurso>0 ? `${totalHrsCurso}h ${restMinCurso}min` : `${restMinCurso} min`)
      : '—';

    cont.innerHTML = `
      <div class="stats-grid" style="grid-template-columns:repeat(auto-fill,minmax(160px,1fr))">

        <div class="stat-card"><div class="stat-icon">⏱</div><div class="stat-value" style="font-size:${totalHrsCurso>=10?'18px':'22px'}">${tiempoCursoStr}</div><div class="stat-label">Tiempo Total Curso</div></div>
      </div>
      <div class="card">
        <div class="card-header"><h3>📋 Detalle por Clase</h3></div>
        <div class="table-wrap"><table>
          <thead><tr><th>Clase</th><th>Fecha</th><th>Estado</th><th>Hora Registro</th><th style="text-align:center">Minutos</th></tr></thead>
          <tbody>${sortedDocs.map(d=>{
            const a=d.data();
            return `<tr>
              <td><strong>${escHtml(a.classTitle||'—')}</strong></td>
              <td><span style="font-family:'DM Mono';font-size:12px">${escHtml(a.date||'—')}</span></td>

              <td style="font-size:12px">${fmtDateTime(a.checkedAt)}</td>
              <td style="font-family:'DM Mono';font-size:13px;text-align:center">${a.minutosEnClase!=null?a.minutosEnClase+' min':'—'}</td>
            </tr>`;}).join('')}
          </tbody></table></div>

async function cargarTablaAsistencia() {
  const cont = document.getElementById('attTableContainer');
  if (!cont) return;
  cont.innerHTML='<div class="empty-state"><div class="icon">⏳</div><p>Cargando...</p></div>';

  const classId  = document.getElementById('attFilterClass')?.value||'';
  const date     = document.getElementById('attFilterDate')?.value||todayStr();

  try {
    // Obtener todos los alumnos
    const alumnosSnap = await db.collection('users').where('role','==','student').get();
    const alumnosDocs = alumnosSnap.docs.sort((a,b)=>(a.data().name||'').localeCompare(b.data().name||'','es'));

    // Obtener asistencia del día
    let attQuery = db.collection('attendance').where('date','==',date);
    if (classId) attQuery = attQuery.where('classId','==',classId);
    const attSnap = await attQuery.get();

    // Mapa userId → asistencia
    const attMap = {};
    attSnap.docs.forEach(d => {
      const a=d.data();
      const key = classId ? a.userId : `${a.userId}__${a.classId}`;
      attMap[key] = a;
    });

    if (alumnosDocs.length === 0) {
      cont.innerHTML='<div class="empty-state"><div class="icon">📭</div><p>No hay alumnos registrados.</p></div>'; return;
    }

    const dateFormatted = new Date(date+'T12:00:00').toLocaleDateString('es-CL',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

    cont.innerHTML = `
      <div class="card">
        <div class="card-header">
          <h3>📋 Asistencia — ${escHtml(dateFormatted)}</h3>
          <span class="badge badge-blue">${attSnap.docs.filter(d=>d.data().present).length} presentes</span>
        </div>
        <div class="table-wrap"><table>
          <thead><tr><th>Alumno</th><th>RUT</th><th>Estado</th><th>Entrada</th><th>Salida</th><th>Minutos</th><th>Online</th></tr></thead>
          <tbody>${alumnosDocs.map(d=>{
            const u=d.data();
            const att = classId ? attMap[u.uid||d.id] : Object.values(attMap).find(a=>a.userId===(u.uid||d.id));
            const present = att?.present===true;
            const online  = att?.online && att?.checkedAt && (new Date()-att.checkedAt.toDate?.()||0)<600000;
            return `<tr>
              <td><div style="display:flex;align-items:center;gap:8px">
                <div style="width:28px;height:28px;border-radius:50%;background:${present?'var(--success)':'#ccc'};color:#fff;font-weight:700;font-size:11px;display:inline-flex;align-items:center;justify-content:center">${(u.name||'?').slice(0,2).toUpperCase()}</div>
                <strong>${escHtml(u.name||'—')}</strong>
              </div></td>
              <td><span style="font-family:'DM Mono';font-size:12px">${escHtml(u.rut||'—')}</span></td>
              <td><span class="badge ${present?'badge-green':'badge-gray'}">${present?'✅ Presente':'— Ausente'}</span></td>
              <td style="font-size:12px;font-family:'DM Mono'">${att?.checkedAt ? fmtTime(att.checkedAt) : '—'}</td>
              <td style="font-size:12px;font-family:'DM Mono'">${att?.salidaAt ? fmtTime(att.salidaAt) : '—'}</td>
              <td style="font-size:12px;text-align:center">${att?.minutosEnClase ? att.minutosEnClase+' min' : '—'}</td>
              <td><span class="${online?'online-dot':'offline-dot'}"></span>${online?'Online':'—'}</td>
            </tr>`;
          }).join('')}</tbody></table></div>
      </div>`;
  } catch(e) {
    cont.innerHTML=`<div class="empty-state"><div class="icon">❌</div><p>${escHtml(e.message)}</p></div>`;
  }
}

let _reportTitle = '';
